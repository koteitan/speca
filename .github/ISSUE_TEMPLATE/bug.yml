name: 🐛 Bug Report
description: バグ報告
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ありがとうございます！再現・修正を最短化するため、可能な範囲で埋めてください。

        **テスト実行**: `uv run python -m pytest`

  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 何が起きているかを1〜2行で
      placeholder: 例）Xを実行するとYで落ちる
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: 再現手順
      description: 手順を番号付きで。最後にテストコマンドも書いてください
      placeholder: |
        1.
        2.
        3. uv run python -m pytest
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期待する挙動
      description: 正しい状態を具体的に
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 現状の挙動（ログ/エラー）
      description: `uv run python -m pytest` の最後20行など（貼り付け推奨）
      render: shell
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 環境情報
      description: OS/ランタイム/依存など分かる範囲で
      placeholder: |
        OS:
        Python:
        uv:
        その他:
    validations:
      required: false

  - type: checkboxes
    id: acceptance
    attributes:
      label: 受け入れ条件
      options:
        - label: "`uv run python -m pytest` が成功する（exit code 0）"
          required: true
        - label: 必要ならテスト追加/修正が含まれる
          required: false
        - label: 変更理由がPR説明に書かれている
          required: false

  - type: textarea
    id: openhands_instructions
    attributes:
      label: OpenHandsへの指示（そのままIssue本文に入ります）
      description: このままでOK。必要なら追記してください
      value: |
        @openhands-agent
        - 必ず実コード変更を含めて修正してください（差分が0だとPR作成で失敗します）。
        - 修正後に `uv run python -m pytest` を実行して通ることを確認してください。
        - もしコード変更が不要だと判断した場合は、その理由と代替案をIssueにコメントしてください。
    validations:
      required: true
