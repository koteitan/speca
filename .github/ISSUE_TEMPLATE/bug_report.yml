name: Bug report
description: Report a bug or unexpected behavior in SPECA
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please include enough information to reproduce — without a reproducer the bug is hard to triage.
        Before submitting, please [search existing issues](https://github.com/NyxFoundation/speca/issues?q=is%3Aissue) to avoid duplicates.

  - type: dropdown
    id: phase
    attributes:
      label: Affected component
      options:
        - "Phase 01a (Spec Discovery)"
        - "Phase 01b (Subgraph Extraction)"
        - "Phase 01e (Property Generation)"
        - "Phase 02c (Code Pre-resolution)"
        - "Phase 03 (Audit Map)"
        - "Phase 04 (Audit Review)"
        - "Phase 05 / 06 / 06b (manual reporting)"
        - "Orchestrator / harness (scripts/orchestrator/)"
        - "Benchmarks (RQ1 / RQ2 / RQ2b)"
        - "Documentation"
        - "Other"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: SPECA commit / branch
      description: Output of `git rev-parse --short HEAD` or branch name
      placeholder: "5b6e0e49 (or main)"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the unexpected behavior.
    validations:
      required: true

  - type: textarea
    id: reproducer
    attributes:
      label: Steps to reproduce
      description: Minimal commands and inputs (`outputs/TARGET_INFO.json`, `BUG_BOUNTY_SCOPE.json`) needed to reproduce.
      render: shell
      placeholder: |
        uv run python3 scripts/run_phase.py --phase 03 --workers 1
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Python version, OS, Claude Code CLI version, model used.
      placeholder: |
        Python: 3.11.6
        OS: macOS 14.4 / Ubuntu 22.04
        claude code: 2.1.39
        Model: Sonnet 4.5
      render: yaml
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Relevant excerpts from `outputs/` or `outputs/logs/`. **Please redact any API keys or secrets.**
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I have searched existing issues and confirmed this is not a duplicate.
          required: true
        - label: I have removed any API keys, tokens, or secrets from the logs above.
          required: true
