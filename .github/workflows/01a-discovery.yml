name: "01a. Discovery"

on:
  workflow_dispatch:
    inputs:
      keywords:
        description: 'Keywords (comma-separated)'
        required: true
        type: string
        default: 'geth,ethereum client,execution specs,EIP'
      spec_urls:
        description: 'Specification URLs (comma-separated)'
        required: true
        type: string
        default: 'https://ethereum.github.io/execution-specs/src/,https://geth.ethereum.org/docs'
      branch:
        description: 'Branch to use (leave empty to create new)'
        required: false
        type: string
        default: ''
      append_mode:
        description: 'Append to existing STATE (instead of overwriting)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  discovery:
    runs-on: self-hosted

    env:
      KEYWORDS: ${{ inputs.keywords }}
      SPEC_URLS: ${{ inputs.spec_urls }}
      APPEND_MODE: ${{ inputs.append_mode }}
      CLAUDE_CODE_PERMISSIONS: bypassPermissions
      CLAUDE_CODE_MAX_OUTPUT_TOKENS: 100000

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}
          fetch-depth: 0

      - name: Update Scripts and Prompts from Remote
        run: |
          set -e
          # Sync scripts/prompts from the SAME branch that triggered this workflow
          # (github.ref_name). When run on a feature branch, this ensures the
          # scripts match the branch context. To sync from the default branch
          # instead, replace github.ref_name with github.event.repository.default_branch.
          echo "Syncing scripts and prompts from origin/${{ github.ref_name }}..."
          git fetch --prune origin
          git checkout origin/${{ github.ref_name }} -- scripts/ prompts/ .github/workflows/ .claude/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: |
          if command -v claude >/dev/null 2>&1; then
            echo "claude already installed; skipping"
          else
            npm install -g @anthropic-ai/claude-code
          fi

      - name: Setup MCP Servers
        run: FILESYSTEM_DIRS="." bash scripts/setup_mcp.sh
        env:
          GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Git & Branch
        id: git_config
        run: |
          git config --local user.name "Security Agent Bot"
          git config --local user.email "bot@nyxfoundation.org"

          if [ -z "${{ inputs.branch }}" ]; then
            RUN_ID=$(date +'%Y%m%d-%H%M%S')
            BRANCH="prep-runs/${RUN_ID}"
            git checkout -b "${BRANCH}"
            echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          else
            echo "branch=${{ inputs.branch }}" >> $GITHUB_OUTPUT
          fi

      - name: "Pre-flight: Schema & Config Tests"
        run: uv run python3 -m pytest tests/ -v --tb=short

      - name: "Step 01a: Discovery & Queuing"
        run: |
          uv run python3 scripts/run_phase.py --phase 01a \
            ${{ inputs.append_mode == 'true' && '--force' || '' }}
        env:
          GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Results
        if: success() || failure()
        run: |
          git add outputs/ ':!outputs/logs/'
          if ! git diff --staged --quiet; then
            git add outputs/logs/
            if [ "${{ inputs.append_mode }}" = "true" ]; then
              git commit -m "01a: appended new URLs to discovery"
            else
              git commit -m "01a: discovery complete"
            fi
            git push origin "${{ steps.git_config.outputs.branch }}" --force-with-lease
          fi

      - name: Summary
        run: |
          echo "## Next: Run **2. Extraction**" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ steps.git_config.outputs.branch }}\`" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.append_mode }}" = "true" ]; then
            echo "Mode: **Append** (added to existing STATE)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: step-1-logs-${{ github.run_id }}
          path: outputs/logs/
          retention-days: 7
