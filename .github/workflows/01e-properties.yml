name: "01e. Properties"

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch from 01b/01c'
        required: true
        type: string
      workers:
        description: 'Number of parallel workers'
        required: false
        type: number
        default: 4
      max_concurrent:
        description: 'Max concurrent Claude calls'
        required: false
        type: number
        default: 64
      force_execute:
        description: 'Force execute (ignore skip conditions)'
        required: false
        type: boolean
        default: false
      bug_bounty_scope:
        description: |
          Bug Bounty Scope Definition (JSON format)

          Define which components are in-scope and out-of-scope for the bug bounty program.

          Example (Ethereum Bug Bounty):
          {
            "program_name": "Ethereum Bug Bounty",
            "program_url": "https://ethereum.org/en/bug-bounty/",
            "in_scope": {
              "components": ["P2P Network", "Transaction Pool", "Block Validation", "State Transition", "Engine API", "Consensus Logic"],
              "entry_points": ["P2P", "Transaction", "Engine API"],
              "notes": "Focus on external attacks via P2P network and transaction submission"
            },
            "out_of_scope": {
              "components": ["JSON-RPC API", "Beacon API", "Configuration", "Tests", "Infrastructure"],
              "reasons": {
                "JSON-RPC API": "Explicitly out-of-scope per Ethereum Bug Bounty",
                "Beacon API": "Explicitly out-of-scope per Ethereum Bug Bounty",
                "Configuration": "Requires node operator error, not external attack",
                "Tests": "Not part of production code",
                "Infrastructure": "Not part of core protocol"
              }
            },
            "conditional_scope": {
              "CL_dependency": {
                "in_scope": false,
                "reason": "Requires malicious CL node, not direct EL vulnerability"
              },
              "high_effort_dos": {
                "in_scope": false,
                "reason": "Requires sustained attack with significant resources"
              }
            }
          }
        required: false
        type: string
        default: |
          {
            "program_name": "Ethereum Bug Bounty",
            "program_url": "https://ethereum.org/en/bug-bounty/",
            "in_scope": {
              "components": ["P2P Network", "Transaction Pool", "Block Validation", "State Transition", "Engine API", "Consensus Logic"],
              "entry_points": ["P2P", "Transaction", "Engine API"]
            },
            "out_of_scope": {
              "components": ["JSON-RPC API", "Beacon API", "Configuration", "Tests", "Infrastructure"],
              "reasons": {
                "JSON-RPC API": "Explicitly out-of-scope per Ethereum Bug Bounty",
                "Beacon API": "Explicitly out-of-scope per Ethereum Bug Bounty",
                "Configuration": "Requires node operator error, not external attack"
              }
            },
            "conditional_scope": {
              "CL_dependency": {"in_scope": false, "reason": "Requires malicious CL node"},
              "high_effort_dos": {"in_scope": false, "reason": "Requires sustained attack"}
            }
          }

permissions:
  contents: write

jobs:
  properties:
    runs-on: self-hosted

    env:
      CLAUDE_CODE_PERMISSIONS: bypassPermissions
      CLAUDE_CODE_MAX_OUTPUT_TOKENS: 100000

    steps:
      - name: Checkout Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Update Scripts and Prompts from Remote
        run: |
          set -e
          echo "Syncing scripts and prompts with remote branch..."
          git fetch --prune origin
          git checkout origin/${{ github.ref_name }} -- scripts/ prompts/ .github/workflows/ .claude/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: |
          if command -v claude >/dev/null 2>&1; then
            echo "claude already installed; skipping"
          else
            npm install -g @anthropic-ai/claude-code
          fi

      - name: Setup MCP Servers
        run: FILESYSTEM_DIRS="." bash scripts/setup_mcp.sh
        env:
          GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Git
        run: |
          git config --local user.name "Security Agent Bot"
          git config --local user.email "bot@nyxfoundation.org"

      - name: Write Bug Bounty Scope to file
        if: ${{ inputs.bug_bounty_scope != '' }}
        run: |
          mkdir -p outputs
          printf '%s\n' '${{ inputs.bug_bounty_scope }}' > outputs/BUG_BOUNTY_SCOPE.json
          echo "✅ Wrote BUG_BOUNTY_SCOPE.json"

      - name: "Pre-flight: Schema & Config Tests"
        run: uv run python3 -m pytest tests/ -v --tb=short

      - name: "Step 01e: Properties (Parallel)"
        run: uv run python3 scripts/run_phase.py --phase 01e --workers ${{ inputs.workers }} --max-concurrent ${{ inputs.max_concurrent }} ${{ inputs.force_execute && '--force' || '' }}
        env:
          GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Results
        if: success() || failure()
        run: |
          git add outputs/ ':!outputs/logs/'
          if ! git diff --staged --quiet; then
            git add outputs/logs/
            git commit -m "01e: properties"
            git push origin "${{ inputs.branch }}" --force-with-lease
          fi

      - name: Summary
        run: |
          echo "## Next: Run **02. Checklist Generation**" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ inputs.branch }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: step-3b-logs-${{ github.run_id }}
          path: outputs/logs/
          retention-days: 7
