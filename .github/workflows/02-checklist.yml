name: "02. Checklist Generation"

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch from 01e'
        required: true
        type: string
      workers:
        description: 'Number of parallel workers'
        required: false
        type: number
        default: 4
      max_concurrent:
        description: 'Max concurrent Claude calls'
        required: false
        type: number
        default: 64
      force_execute:
        description: 'Force execute (ignore skip conditions)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  checklist-generation:
    runs-on: self-hosted

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CLAUDE_CODE_PERMISSIONS: bypassPermissions
      CLAUDE_CODE_MAX_OUTPUT_TOKENS: 100000

    steps:
      - name: Checkout Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Update Scripts and Prompts from Remote
        run: |
          set -e
          echo "Syncing scripts and prompts with remote branch..."
          git fetch --prune origin
          git checkout origin/${{ github.ref_name }} -- scripts/ prompts/ Makefile .github/workflows/ .claude/

      - name: Verify Prerequisites
        run: |
          if [ -z "$(ls outputs/01e_PROP_PARTIAL_*.json 2>/dev/null)" ]; then
            echo "Missing: outputs/01e_PROP_PARTIAL_*.json - Run 01e first"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: |
          if command -v claude >/dev/null 2>&1; then
            echo "claude already installed; skipping"
          else
            npm install -g @anthropic-ai/claude-code
          fi

      - name: Setup MCP Servers
        run: make mcp-setup FILESYSTEM_DIRS="."

      - name: Prepare Git
        run: |
          git config --global user.name "Security Agent Bot"
          git config --global user.email "bot@nyxfoundation.org"

      - name: "Step 02: Unified Checklist Generation (Parallel)"
        run: make 02-parallel WORKERS=${{ inputs.workers }} MAX_CONCURRENT=${{ inputs.max_concurrent }} ${{ inputs.force_execute && 'FORCE_EXECUTE=1' || '' }}

      - name: Push Results
        if: always()
        run: |
          git add outputs/ ':!outputs/logs/'
          if ! git diff --staged --quiet; then
            git add outputs/logs/
            git commit -m "02: unified checklist generation"
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin "${{ inputs.branch }}" --force-with-lease
          fi

      - name: Summary
        run: |
          echo "## Next: Run **02s. Preparation Review**" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ inputs.branch }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: step-4-logs-${{ github.run_id }}
          path: outputs/logs/
          retention-days: 7
