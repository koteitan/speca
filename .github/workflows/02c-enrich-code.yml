name: "02-enrich. Code Pre-resolution (Optional)"

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch from 02'
        required: true
        type: string

permissions:
  contents: write

jobs:
  enrich-code:
    runs-on: self-hosted

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CLAUDE_CODE_PERMISSIONS: bypassPermissions
      CLAUDE_CODE_MAX_OUTPUT_TOKENS: 100000

    steps:
      - name: Checkout Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Update Scripts and Prompts from Remote
        run: |
          set -e
          echo "Syncing scripts and prompts with remote branch..."
          git fetch --prune origin
          git checkout origin/${{ github.ref_name }} -- scripts/ prompts/ .github/workflows/ .claude/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: |
          if command -v claude >/dev/null 2>&1; then
            echo "claude already installed; skipping"
          else
            npm install -g @anthropic-ai/claude-code
          fi

      - name: Setup MCP Servers
        run: FILESYSTEM_DIRS="." bash scripts/setup_mcp.sh

      - name: Prepare Git
        run: |
          git config --local user.name "Security Agent Bot"
          git config --local user.email "bot@nyxfoundation.org"

      - name: "Step 1: Prepare Enrichment Input"
        run: uv run python3 scripts/enrich_checklist_with_code.py outputs/

      - name: "Step 2: Enrich with Code Locations"
        run: |
          if [ -f outputs/02_CHECKLIST_ENRICHED.json ]; then
            claude --mcp-config .claude/mcp.json /02_enrich_code \
              INPUT_FILE=outputs/02_CHECKLIST_ENRICHED.json \
              OUTPUT_FILE=outputs/02_CHECKLIST_WITH_CODE.json
          else
            echo "No enrichment input found, skipping"
          fi

      - name: Push Results
        if: always()
        run: |
          git add outputs/ ':!outputs/logs/'
          if ! git diff --staged --quiet; then
            git add outputs/logs/
            git commit -m "02-enrich: code pre-resolution"
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin "${{ inputs.branch }}" --force-with-lease
          fi

      - name: Summary
        run: |
          echo "## Next: Run **03. Audit Map Generation**" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ inputs.branch }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Code pre-resolution completed. Phase 03 will use enriched data." >> $GITHUB_STEP_SUMMARY

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: enrich-code-logs-${{ github.run_id }}
          path: outputs/logs/
          retention-days: 7