name: "03. Audit Map"

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repository'
        required: true
        type: choice
        options:
          - ethereum/go-ethereum
          - paradigmxyz/reth
          - NethermindEth/nethermind
          - Consensys/teku
          - hyperledger/besu
          - erigontech/erigon
          - status-im/nimbus-eth2
          - sigp/lighthouse
          - ChainSafe/lodestar
          - grandinetech/grandine
          - OffchainLabs/prysm
      target_ref_type:
        description: 'Target ref selection'
        required: true
        type: choice
        options:
          - latest_default_branch
          - fusaka-audit
      workers:
        description: 'Number of parallel workers'
        required: false
        type: number
        default: 4
      max_iterations:
        description: 'Max iterations'
        required: false
        type: number
        default: 100

permissions:
  contents: write

jobs:
  audit-map:
    runs-on: self-hosted

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CLAUDE_CODE_PERMISSIONS: bypassPermissions
      CLAUDE_CODE_MAX_OUTPUT_TOKENS: 100000

    steps:
      - name: Resolve Inputs
        id: resolve_inputs
        env:
          TARGET_REPO_INPUT: ${{ inputs.target_repo }}
          TARGET_REF_TYPE: ${{ inputs.target_ref_type }}
        run: |
          set -euo pipefail
          TARGET_REPO="${TARGET_REPO_INPUT}"
          if [ "${TARGET_REF_TYPE}" = "fusaka-audit" ]; then
            TARGET_MODE="asof_20250915"
          else
            TARGET_MODE="default"
          fi

          echo "TARGET_REPO=${TARGET_REPO}" >> "$GITHUB_ENV"
          echo "TARGET_MODE=${TARGET_MODE}" >> "$GITHUB_ENV"
          echo "checkout_ref=" >> "$GITHUB_OUTPUT"
      - name: Checkout Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Verify Prerequisites
        run: |
          if ! ls outputs/02_CHECKLIST_PARTIAL_*.json >/dev/null 2>&1; then
            echo "Missing: outputs/02_CHECKLIST_PARTIAL_*.json - Run 02 first"
            exit 1
          fi

      - name: Checkout Target Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_REPO }}
          ref: ${{ steps.resolve_inputs.outputs.checkout_ref }}
          fetch-depth: 0
          path: target_workspace

      - name: Resolve Target Ref
        id: target_info
        working-directory: ./target_workspace
        run: |
          set -euo pipefail

          default_branch="$(git symbolic-ref refs/remotes/origin/HEAD 2>/dev/null | sed 's@^refs/remotes/origin/@@' || true)"
          if [ -z "${default_branch}" ]; then
            default_branch="$(git remote show origin 2>/dev/null | awk -F': ' '/HEAD branch/ {print $2}' || true)"
          fi
          if [ -z "${default_branch}" ]; then
            if git show-ref --verify --quiet refs/remotes/origin/main; then
              default_branch="main"
            elif git show-ref --verify --quiet refs/remotes/origin/master; then
              default_branch="master"
            else
              echo "Unable to determine default branch."
              exit 1
            fi
          fi
          target_ref_label=""

          if [ "${TARGET_MODE}" = "asof_20250915" ]; then
            asof_commit="$(git rev-list -n1 --before="2025-09-15T23:59:59Z" "origin/${default_branch}")"
            if [ -z "${asof_commit}" ]; then
              echo "No commit found before 2025-09-15 on ${default_branch}."
              exit 1
            fi
            git checkout "${asof_commit}"
            target_ref_label="fusaka-audit (as of 2025-09-15, ${default_branch})"
          elif [ "${TARGET_MODE}" = "default" ]; then
            target_ref_label="default branch (${default_branch})"
          else
            target_ref_label="manual (default branch ${default_branch})"
          fi

          echo "default_branch=${default_branch}" >> "$GITHUB_OUTPUT"
          echo "full_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "target_ref_label=${target_ref_label}" >> "$GITHUB_OUTPUT"
          echo "repo_name=$(basename "${TARGET_REPO}")" >> "$GITHUB_OUTPUT"

      - name: Create Audit Branch
        id: audit_branch
        run: |
          set -euo pipefail
          repo_name="${{ steps.target_info.outputs.repo_name }}"
          ref_type="${{ inputs.target_ref_type }}"
          commit_version="${{ steps.target_info.outputs.short_sha }}"
          branch_name="audit_${repo_name}_${ref_type}_${commit_version}"
          branch_name="$(echo "${branch_name}" | tr '/ ' '__')"
          git fetch origin "${branch_name}" || true
          if git show-ref --verify --quiet "refs/remotes/origin/${branch_name}"; then
            git checkout "${branch_name}"
            git pull --rebase origin "${branch_name}"
          else
            git checkout -b "${branch_name}"
          fi
          echo "branch_name=${branch_name}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Get Claude Version
        id: claude_version
        run: |
          set -euo pipefail
          if command -v claude >/dev/null 2>&1; then
            echo "version=$(claude --version)" >> "$GITHUB_OUTPUT"
          else
            echo "version=claude-not-found" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare Git
        run: |
          git config --global user.name "Security Agent Bot"
          git config --global user.email "bot@nyxfoundation.org"

      - name: Prepare Inputs for Target
        working-directory: ./target_workspace
        run: |
          mkdir -p outputs
          cp -r ../outputs/* outputs/ 2>/dev/null || true

      - name: "Step 03: Audit Map (Parallel)"
        run: make 03-parallel WORKERS=${{ inputs.workers }} MAX_ITERATIONS=${{ inputs.max_iterations }}

      - name: Save Target Info
        if: always()
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          import os

          data = {
              "target_repo": os.environ["TARGET_REPO"],
              "target_ref_type": os.environ["TARGET_REF_TYPE"],
              "target_ref_label": os.environ["TARGET_REF_LABEL"],
              "target_commit": os.environ["TARGET_COMMIT"],
              "target_commit_short": os.environ["TARGET_COMMIT_SHORT"],
          }

          Path("outputs").mkdir(parents=True, exist_ok=True)
          with open("outputs/03_TARGET_INFO.json", "w", encoding="utf-8") as f:
              json.dump(data, f, indent=2)
          PY
        env:
          TARGET_REPO: ${{ env.TARGET_REPO }}
          TARGET_REF_TYPE: ${{ inputs.target_ref_type }}
          TARGET_REF_LABEL: ${{ steps.target_info.outputs.target_ref_label }}
          TARGET_COMMIT: ${{ steps.target_info.outputs.full_sha }}
          TARGET_COMMIT_SHORT: ${{ steps.target_info.outputs.short_sha }}

      - name: Copy Outputs Back
        if: always()
        run: |
          cp -r target_workspace/outputs/03_*.json outputs/ 2>/dev/null || true
          mkdir -p outputs/logs
          cp -r target_workspace/outputs/logs/03_*.json outputs/logs/ 2>/dev/null || true

      - name: Push Results
        if: always()
        run: |
          git add outputs/ ':!outputs/logs/'
          if ! git diff --staged --quiet; then
            git add outputs/logs/
            git commit -m "03: audit map for ${{ env.TARGET_REPO }}@${{ steps.target_info.outputs.short_sha }}"
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin "${{ steps.audit_branch.outputs.branch_name }}" --force-with-lease
          fi

      - name: Summary
        run: |
          echo "## Next: Run **04. Audit Review**" >> $GITHUB_STEP_SUMMARY
          echo "Base branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Audit branch: \`${{ steps.audit_branch.outputs.branch_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Target repo: \`${{ env.TARGET_REPO }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Target ref: \`${{ steps.target_info.outputs.target_ref_label }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Target commit: \`${{ steps.target_info.outputs.short_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Target commit (full): \`${{ steps.target_info.outputs.full_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Claude: \`${{ steps.claude_version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: step-7-logs-${{ github.run_id }}
          path: outputs/logs/
          retention-days: 7
