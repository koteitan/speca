name: "1. Discovery (01a)"

on:
  workflow_dispatch:
    inputs:
      keywords:
        description: 'Keywords (comma-separated)'
        required: true
        type: string
        default: 'geth,ethereum client,execution specs,EIP'
      spec_urls:
        description: 'Specification URLs (comma-separated)'
        required: true
        type: string
        default: 'https://ethereum.github.io/execution-specs/src/,https://geth.ethereum.org/docs'
      branch:
        description: 'Branch to use (leave empty to create new)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  discovery:
    runs-on: self-hosted

    env:
      KEYWORDS: ${{ inputs.keywords }}
      SPEC_URLS: ${{ inputs.spec_urls }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CLAUDE_CODE_PERMISSIONS: bypassPermissions
      CLAUDE_CODE_MAX_OUTPUT_TOKENS: 100000

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Prepare Git & Branch
        id: git_config
        run: |
          git config --global user.name "Security Agent Bot"
          git config --global user.email "bot@nyxfoundation.org"

          if [ -z "${{ inputs.branch }}" ]; then
            RUN_ID=$(date +'%Y%m%d-%H%M%S')
            BRANCH="prep-runs/${RUN_ID}"
            git checkout -b "${BRANCH}"
            echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          else
            echo "branch=${{ inputs.branch }}" >> $GITHUB_OUTPUT
          fi

      - name: "Step 01a: Discovery & Queuing"
        run: |
          make 01a \
            KEYWORDS="${{ env.KEYWORDS }}" \
            SPEC_URLS="${{ env.SPEC_URLS }}"

      - name: Push Results
        if: always()
        run: |
          git add outputs/ ':!outputs/logs/'
          if ! git diff --staged --quiet; then
            git add outputs/logs/
            git commit -m "01a: discovery complete"
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin "${{ steps.git_config.outputs.branch }}" --force-with-lease
          fi

      - name: Summary
        run: |
          echo "## Next: Run **2. Extraction**" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ steps.git_config.outputs.branch }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: step-1-logs-${{ github.run_id }}
          path: outputs/logs/
          retention-days: 7
