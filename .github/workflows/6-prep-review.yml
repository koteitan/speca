name: "6. Preparation Review (02s)"

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch from Step 5'
        required: true
        type: string

permissions:
  contents: write

jobs:
  prep-review:
    runs-on: self-hosted

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CLAUDE_CODE_PERMISSIONS: bypassPermissions
      CLAUDE_CODE_MAX_OUTPUT_TOKENS: 100000

    steps:
      - name: Checkout Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Verify Prerequisites
        run: |
          if ! ls outputs/02b_CHECKLIST_PARTIAL_*.json >/dev/null 2>&1; then
            echo "Missing: outputs/02b_CHECKLIST_PARTIAL_*.json - Run Step 5 first"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Prepare Git
        run: |
          git config --global user.name "Security Agent Bot"
          git config --global user.email "bot@nyxfoundation.org"

      - name: "Step 02s: Review & Validate"
        run: make 02s

      - name: Push Results
        if: always()
        run: |
          git add outputs/ ':!outputs/logs/'
          if ! git diff --staged --quiet; then
            git add outputs/logs/
            git commit -m "02s: preparation review"
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin "${{ inputs.branch }}" --force-with-lease
          fi

      - name: Summary
        run: |
          echo "## Next: Run **7. Audit Map**" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ inputs.branch }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: step-6-logs-${{ github.run_id }}
          path: outputs/logs/
          retention-days: 7
