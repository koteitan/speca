name: "7. Audit Map (03)"

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch from Step 6'
        required: true
        type: string
      target_repo:
        description: 'Target repository'
        required: true
        type: string
        default: 'ethereum/go-ethereum'
      target_ref:
        description: 'Target ref (branch/tag/commit)'
        required: true
        type: string
        default: 'master'
      workers:
        description: 'Number of parallel workers'
        required: false
        type: number
        default: 4
      max_iterations:
        description: 'Max iterations'
        required: false
        type: number
        default: 100

permissions:
  contents: write

jobs:
  audit-map:
    runs-on: self-hosted

    env:
      TARGET_REPO: ${{ inputs.target_repo }}
      TARGET_REF: ${{ inputs.target_ref }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CLAUDE_CODE_PERMISSIONS: bypassPermissions
      CLAUDE_CODE_MAX_OUTPUT_TOKENS: 100000

    steps:
      - name: Checkout Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Verify Prerequisites
        run: |
          if [ ! -f "outputs/02s_REVIEW_REPORT.json" ]; then
            echo "Missing: outputs/02s_REVIEW_REPORT.json - Run Step 6 first"
            exit 1
          fi

      - name: Checkout Target Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.target_repo }}
          ref: ${{ inputs.target_ref }}
          path: target_workspace

      - name: Get Target Info
        id: target_info
        working-directory: ./target_workspace
        run: |
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Prepare Git
        run: |
          git config --global user.name "Security Agent Bot"
          git config --global user.email "bot@nyxfoundation.org"

      - name: Prepare Inputs for Target
        working-directory: ./target_workspace
        run: |
          mkdir -p outputs
          cp -r ../outputs/* outputs/ 2>/dev/null || true

      - name: "Step 03: Audit Map (Parallel)"
        run: make 03-parallel WORKERS=${{ inputs.workers }} MAX_ITERATIONS=${{ inputs.max_iterations }}

      - name: Copy Outputs Back
        if: always()
        run: |
          cp -r target_workspace/outputs/03_*.json outputs/ 2>/dev/null || true
          mkdir -p outputs/logs
          cp -r target_workspace/outputs/logs/03_*.json outputs/logs/ 2>/dev/null || true

      - name: Push Results
        if: always()
        run: |
          git add outputs/ ':!outputs/logs/'
          if ! git diff --staged --quiet; then
            git add outputs/logs/
            git commit -m "03: audit map for ${{ inputs.target_repo }}@${{ steps.target_info.outputs.short_sha }}"
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin "${{ inputs.branch }}" --force-with-lease
          fi

      - name: Summary
        run: |
          echo "## Next: Run **8. Audit Review**" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ inputs.branch }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Target: \`${{ inputs.target_repo }}@${{ steps.target_info.outputs.short_sha }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: step-7-logs-${{ github.run_id }}
          path: outputs/logs/
          retention-days: 7
