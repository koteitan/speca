name: Security Audit - Execution (GitOps)

permissions:
  contents: write
  pull-requests: write

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 0 * * *'
  # push:
  #   branches: 
  #     - 'audit/*'

jobs:
  audit_gitops:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'Merge')"
    env:
      # --- CONFIGURATION (Override these in your branch) ---
      TARGET_REPO: "ethereum/go-ethereum" # Default (to be overridden)
      TARGET_REF: "master"                          # Default (HEAD of default branch)
      # -----------------------------------------------------
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CLAUDE_CODE_PERMISSIONS: "bypassPermissions"

    steps:
      - name: Checkout Security Agent (Self)
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Checkout Target Repository
        uses: actions/checkout@v3
        with:
          repository: ${{ env.TARGET_REPO }}
          ref: ${{ env.TARGET_REF }}
          path: target_workspace

      - name: Get Target Commit Hash
        id: target_info
        working-directory: ./target_workspace
        run: |
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Prepare Inputs
        working-directory: ./target_workspace
        run: |
          # Copy outputs from previous phase (in repo root ./outputs) to ./target_workspace/outputs
          # This allows the agent running in target_workspace to find "outputs/02_CHECKLIST.json" locally.
          mkdir -p outputs
          cp -r ../outputs/* outputs/ 2>/dev/null || echo "No inputs found in root outputs/"
          ls -F outputs/

      - name: Run 03_auditmap
        working-directory: ./target_workspace
        run: |
          # Run audit scan on "." (target_workspace root)
          # Uses relative path to prompts (../prompts/...)
          claude --dangerously-skip-permissions --agent serena -p "$(cat ../prompts/03_auditmap.md) PATH=."
          test -f outputs/03_AUDITMAP.json || exit 1

      - name: Run 04_review
        working-directory: ./target_workspace
        run: |
          # Review the findings and update the audit map in-place
          claude --dangerously-skip-permissions --agent serena -p "$(cat ../prompts/04_review.md)"
          
          # Verify integrity (optional check, prompt ensures in-place update)
          test -f outputs/03_AUDITMAP.json || exit 1

      - name: Prepare Snapshot Branch
        id: snapshot
        run: |
          BASE_BRANCH="${GITHUB_REF_NAME}"
          TARGET_NAME=$(echo "$TARGET_REPO" | cut -d'/' -f2)
          RUN_ID="${{ steps.target_info.outputs.date }}_${{ steps.target_info.outputs.short_sha }}"
          SNAPSHOT_BRANCH="audit-runs/${TARGET_NAME}/${RUN_ID}"
          
          echo "base_branch=${BASE_BRANCH}" >> $GITHUB_OUTPUT
          echo "snapshot_branch=${SNAPSHOT_BRANCH}" >> $GITHUB_OUTPUT
          
          git config --global user.name "Security Agent Bot"
          git config --global user.email "bot@nyxfoundation.org"

          git checkout -b "$SNAPSHOT_BRANCH"

          # Copy outputs back from target_workspace to local outputs/ for commit
          rm -rf outputs/
          mkdir -p outputs/
          cp -r target_workspace/outputs/* outputs/ 2>/dev/null || echo "No outputs found to copy"

      - name: Commit and Push Snapshot
        run: |
          git add outputs/
          if ! git diff --staged --quiet; then
            git commit -m "audit: snapshot for $TARGET_REPO @ ${{ steps.target_info.outputs.short_sha }}"
            
            # Use HTTPS with GITHUB_TOKEN
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin "${{ steps.snapshot.outputs.snapshot_branch }}"
          else
            echo "No changes found. Skipping PR."
            echo "skip_pr=true" >> $GITHUB_ENV
          fi

      - name: Create Pull Request
        if: env.skip_pr != 'true'
        run: |
          gh pr create \
            --base "${{ steps.snapshot.outputs.base_branch }}" \
            --head "${{ steps.snapshot.outputs.snapshot_branch }}" \
            --title "Audit Report: $TARGET_REPO (${{ steps.target_info.outputs.short_sha }})" \
            --body "Automated audit report for $TARGET_REPO commit ${{ steps.target_info.outputs.short_sha }}." \
            || echo "PR may already exist."