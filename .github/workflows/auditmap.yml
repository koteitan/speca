name: Security Audit - Audit Map

on:
  workflow_dispatch:
    inputs:
      targets:
        description: 'JSON array of targets, e.g., [{"repo": "ethereum/go-ethereum", "ref": "master"}]'
        required: true
        type: string
        default: '[{"repo": "ethereum/go-ethereum", "ref": "master"}]'
      iterations:
        description: 'Number of audit map iterations per target'
        required: false
        type: number
        default: 10
      create_pr:
        description: 'Create Pull Request (if unchecked, push directly to current branch)'
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  # Parse the JSON input and prepare the matrix
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set matrix
        id: set-matrix
        run: |
          echo "matrix=${{ inputs.targets }}" >> $GITHUB_OUTPUT

  # Run audit map for each target in parallel
  auditmap:
    needs: setup
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'Merge')"

    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.setup.outputs.matrix) }}

    env:
      TARGET_REPO: ${{ matrix.target.repo }}
      TARGET_REF: ${{ matrix.target.ref }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CLAUDE_CODE_PERMISSIONS: bypassPermissions
      CLAUDE_CODE_MAX_OUTPUT_TOKENS: 100000

    steps:
      - name: Checkout Security Agent (Self)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Target Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.target.repo }}
          ref: ${{ matrix.target.ref }}
          path: target_workspace

      - name: Get Target Commit Hash
        id: target_info
        working-directory: ./target_workspace
        run: |
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "full_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          # Create a safe name for branch/artifact naming
          TARGET_NAME=$(echo "${{ matrix.target.repo }}" | tr '/' '-')
          echo "target_name=${TARGET_NAME}" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Prepare Inputs
        working-directory: ./target_workspace
        run: |
          mkdir -p outputs
          cp -r ../outputs/* outputs/ 2>/dev/null || echo "No inputs found in root outputs/"
          ls -F outputs/

      - name: Run Audit Map (${{ inputs.iterations }} iterations)
        run: |
          for i in $(seq 1 ${{ inputs.iterations }}); do
            echo "⭐ Running make 03 (iteration $i/${{ inputs.iterations }})..."
            make 03 \
              TARGET_REPO="${{ matrix.target.repo }}" \
              TARGET_REF="${{ matrix.target.ref }}"
            echo "✅ Finished make 03 iteration $i"
          done
          # Verify at least one partial output was generated
          ls outputs/03_AUDITMAP_PARTIAL_*.json >/dev/null 2>&1 || exit 1

      - name: Prepare Git Configuration
        id: git_config
        run: |
          git config --global user.name "Security Agent Bot"
          git config --global user.email "bot@nyxfoundation.org"

          TARGET_NAME=$(echo "${{ matrix.target.repo }}" | cut -d'/' -f2)
          RUN_ID="${{ steps.target_info.outputs.date }}_${{ steps.target_info.outputs.short_sha }}"
          SNAPSHOT_BRANCH="audit-runs/${TARGET_NAME}/${RUN_ID}"

          echo "target_name=${TARGET_NAME}" >> $GITHUB_OUTPUT
          echo "run_id=${RUN_ID}" >> $GITHUB_OUTPUT
          echo "snapshot_branch=${SNAPSHOT_BRANCH}" >> $GITHUB_OUTPUT
          echo "base_branch=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

          # Copy outputs back from target_workspace
          rm -rf outputs/03_*.json outputs/logs/03_*.json 2>/dev/null || true
          cp -r target_workspace/outputs/03_*.json outputs/ 2>/dev/null || true
          mkdir -p outputs/logs
          cp -r target_workspace/outputs/logs/03_*.json outputs/logs/ 2>/dev/null || true

      - name: Create Branch and Push (PR mode)
        if: ${{ inputs.create_pr == true }}
        run: |
          git checkout -b "${{ steps.git_config.outputs.snapshot_branch }}"
          git add outputs/

          if ! git diff --staged --quiet; then
            git commit -m "$(cat <<'EOF'
          audit: auditmap for ${{ matrix.target.repo }} @ ${{ steps.target_info.outputs.short_sha }}

          Target Repository: ${{ matrix.target.repo }}
          Target Ref: ${{ matrix.target.ref }}
          Commit: ${{ steps.target_info.outputs.full_sha }}
          Iterations: ${{ inputs.iterations }}
          Run ID: ${{ github.run_id }}
          EOF
          )"

            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin "${{ steps.git_config.outputs.snapshot_branch }}"
          else
            echo "No changes found. Skipping."
            echo "skip_pr=true" >> $GITHUB_ENV
          fi

      - name: Create Pull Request
        if: ${{ inputs.create_pr == true && env.skip_pr != 'true' }}
        run: |
          gh pr create \
            --base "${{ steps.git_config.outputs.base_branch }}" \
            --head "${{ steps.git_config.outputs.snapshot_branch }}" \
            --title "Audit Map Report: ${{ matrix.target.repo }} (${{ steps.target_info.outputs.short_sha }})" \
            --body "$(cat <<'EOF'
          ## Audit Map Phase Completed

          **Target Repository:** ${{ matrix.target.repo }}
          **Target Ref:** ${{ matrix.target.ref }}
          **Commit:** ${{ steps.target_info.outputs.full_sha }}
          **Iterations:** ${{ inputs.iterations }}

          ### Generated Outputs
          - `outputs/03_AUDITMAP_PARTIAL_*.json` - Audit map partial results
          - `outputs/03_STATE.json` - Audit map state

          ---
          *Generated by Security Agent Audit Map Pipeline (Run ID: ${{ github.run_id }})*
          EOF
          )" \
            || echo "PR may already exist."

      - name: Push Directly (non-PR mode)
        if: ${{ inputs.create_pr == false }}
        run: |
          git add outputs/

          if ! git diff --staged --quiet; then
            git commit -m "$(cat <<'EOF'
          audit: auditmap for ${{ matrix.target.repo }} @ ${{ steps.target_info.outputs.short_sha }}

          Target Repository: ${{ matrix.target.repo }}
          Target Ref: ${{ matrix.target.ref }}
          Commit: ${{ steps.target_info.outputs.full_sha }}
          Iterations: ${{ inputs.iterations }}
          Run ID: ${{ github.run_id }}
          EOF
          )"

            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin HEAD
          else
            echo "No changes found. Skipping push."
          fi

      - name: Upload logs as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: auditmap-logs-${{ steps.target_info.outputs.target_name }}-${{ steps.git_config.outputs.run_id }}
          path: outputs/logs/
          retention-days: 7
