name: "RQ1 Benchmark 03: Evaluate FP"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  eval-fp:
    if: ${{ github.actor == 'grandchildrice' || github.actor == 'hirorogo' }}
    runs-on: self-hosted

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CLAUDE_CODE_PERMISSIONS: bypassPermissions
      RESULTS_DIR: benchmarks/results/rq1/sherlock_ethereum_audit_contest

    steps:
      - name: Checkout Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Python (uv)
        run: uv sync --python 3.11

      - name: Discover Branches
        run: |
          BRANCHES=$(ls -d "${RESULTS_DIR}"/*/ 2>/dev/null | xargs -n1 basename | paste -sd, -)
          if [ -z "$BRANCHES" ]; then
            echo "No branch directories found in ${RESULTS_DIR}. Run 01-setup first."
            exit 1
          fi
          echo "BRANCHES=${BRANCHES}" >> "$GITHUB_ENV"
          echo "Discovered branches: ${BRANCHES}"

      - name: Evaluate FP + Generate Labels CSV
        run: |
          uv run python -m benchmarks.rq1.cli \
            --branches "${BRANCHES}" \
            --results-dir "${RESULTS_DIR}" \
            --metadata "${RESULTS_DIR}/run_metadata.json" \
            --label --reparse

      - name: Push FP Results
        if: always()
        run: |
          git add "${RESULTS_DIR}/"
          if ! git diff --staged --quiet; then
            git commit -m "benchmark: rq1 03-eval-fp"
            git push origin "${{ github.ref_name }}" --force-with-lease
          fi
