name: "RQ1 Benchmark 04: Generate Report"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    if: ${{ github.actor == 'grandchildrice' || github.actor == 'hirorogo' }}
    runs-on: self-hosted

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RESULTS_DIR: benchmarks/results/rq1/sherlock_ethereum_audit_contest

    steps:
      - name: Checkout Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Python (uv)
        run: uv sync --python 3.11

      - name: Generate Report (recompute precision from labels CSV)
        run: |
          uv run python benchmarks/rq1/generate_report.py \
            --summary "${RESULTS_DIR}/evaluation_summary.json" \
            --collection "${RESULTS_DIR}/collection_summary.json" \
            --labels-csv "${RESULTS_DIR}/findings_labels.csv" \
            --output "${RESULTS_DIR}/evaluation_summary.md"

      - name: Push Report
        if: always()
        run: |
          git add "${RESULTS_DIR}/"
          if ! git diff --staged --quiet; then
            git commit -m "benchmark: rq1 04-report"
            git push origin "${{ github.ref_name }}" --force-with-lease
          fi
