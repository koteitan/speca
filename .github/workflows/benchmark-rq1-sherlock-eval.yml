name: "RQ1 Benchmark: Sherlock Audit Map Evaluation"

on:
  workflow_dispatch:
    inputs:
      branches:
        description: "Comma-separated list of audit branches"
        required: true
        type: string
      use_llm:
        description: "Use LLM for stage3 matching"
        required: false
        type: boolean
        default: true
      llm_max:
        description: "Max LLM calls per branch"
        required: false
        type: number
        default: 200

permissions:
  contents: write

jobs:
  sherlock-eval:
    runs-on: self-hosted

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      LLM_PROVIDER: codex

    steps:
      - name: Checkout Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Fetch Remote Branches
        run: git fetch --prune origin "+refs/heads/*:refs/remotes/origin/*"

      - name: Setup Python (uv)
        run: uv sync --python 3.11

      - name: Setup Node.js
        if: ${{ inputs.use_llm }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Codex CLI
        if: ${{ inputs.use_llm }}
        run: |
          if command -v codex >/dev/null 2>&1; then
            echo "codex already installed; skipping"
          else
            npm install -g @openai/codex
          fi
      - name: Reset Previous Results
        run: |
          rm -rf benchmarks/results/rq1/sherlock_ethereum_audit_contest
          mkdir -p benchmarks/results/rq1/sherlock_ethereum_audit_contest

      - name: Collect Audit Outputs
        run: |
          uv run python benchmarks/scripts/collect_branch_outputs.py \
            --branches "${{ inputs.branches }}" \
            --output-globs "03_PARTIAL_*.json,03_AUDITMAP_PARTIAL_*.json,TARGET_INFO.json" \
            --output-root "benchmarks/results/rq1/sherlock_ethereum_audit_contest"

      - name: Verify Collected Outputs
        run: |
          python3 - <<'PY'
          import glob
          import os
          branches = [b.strip() for b in os.environ.get("BRANCHES", "").split(",") if b.strip()]
          patterns = [p.strip() for p in os.environ.get("OUTPUT_GLOBS", "").split(",") if p.strip()]
          missing = []
          for branch in branches:
            sanitized = branch.replace("/", "__")
            matches = []
            for pattern in patterns:
              matches.extend(glob.glob(f"benchmarks/results/rq1/sherlock_ethereum_audit_contest/{sanitized}/{pattern}"))
            if not matches:
              missing.append(branch)
          if missing:
            raise SystemExit(f"No outputs/03_*.json collected for: {', '.join(missing)}")
          PY
        env:
          BRANCHES: ${{ inputs.branches }}
          OUTPUT_GLOBS: "03_PARTIAL_*.json,03_AUDITMAP_PARTIAL_*.json,TARGET_INFO.json"

      - name: Capture AI Version
        run: |
          AI_VERSION="unknown"
          if [ "${{ inputs.use_llm }}" = "true" ] && command -v codex >/dev/null 2>&1; then
            AI_VERSION="$(codex --version 2>/dev/null | head -n1)"
            if [ -z "$AI_VERSION" ]; then
              AI_VERSION="unknown"
            fi
          fi
          echo "AI_VERSION=$AI_VERSION" >> "$GITHUB_ENV"

      - name: Build Run Metadata
        run: |
          uv run python benchmarks/rq1/build_metadata.py \
            --collection "benchmarks/results/rq1/sherlock_ethereum_audit_contest/collection_summary.json" \
            --output "benchmarks/results/rq1/sherlock_ethereum_audit_contest/run_metadata.json" \
            --ai-version "${AI_VERSION}"

      - name: Evaluate Matches
        run: |
          LLM_FLAG=""
          if [ "${{ inputs.use_llm }}" = "true" ]; then
            LLM_FLAG="--use-llm"
          fi
          uv run python benchmarks/rq1/cli.py \
            --branches "${{ inputs.branches }}" \
            --results-dir "benchmarks/results/rq1/sherlock_ethereum_audit_contest" \
            --llm-max "${{ inputs.llm_max }}" \
            --metadata "benchmarks/results/rq1/sherlock_ethereum_audit_contest/run_metadata.json" \
            --audit-classifications "NEEDS-MANUAL-AUDIT,NEEDS-REVIEW,exploitable" \
            --audit-include-bug-bounty \
            --client-filter auto \
            $LLM_FLAG

      - name: Generate Markdown Report
        run: |
          uv run python benchmarks/rq1/generate_report.py \
            --summary "benchmarks/results/rq1/sherlock_ethereum_audit_contest/evaluation_summary.json" \
            --collection "benchmarks/results/rq1/sherlock_ethereum_audit_contest/collection_summary.json" \
            --output "benchmarks/results/rq1/sherlock_ethereum_audit_contest/evaluation_summary.md"

      - name: Push Evaluation Results
        if: always()
        run: |
          git add benchmarks/results/rq1/sherlock_ethereum_audit_contest/
          if ! git diff --staged --quiet; then
            git commit -m "benchmark: sherlock audit evaluation"
            git config --local http.https://github.com/.extraheader "Authorization: bearer ${GH_TOKEN}"
            git push origin "${{ github.ref_name }}" --force-with-lease
          fi
