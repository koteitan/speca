name: "RQ2 Benchmark 01: Setup Dataset"

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: "Dataset to prepare"
        required: true
        type: choice
        options:
          - primevul
          - cvefixes
          - vul4j
        default: "primevul"
      branch:
        description: "Branch to use (leave empty to create new)"
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  setup-dataset:
    runs-on: self-hosted

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}
          fetch-depth: 0

      - name: Validate Dataset Selection
        run: |
          case "${{ inputs.dataset }}" in
            primevul|cvefixes|vul4j)
              echo "Dataset=${{ inputs.dataset }}"
              ;;
            *)
              echo "Unsupported dataset: ${{ inputs.dataset }}"
              exit 1
              ;;
          esac

      - name: Setup Python (uv)
        run: uv sync --python 3.11

      - name: Fetch CVEfixes Cache (optional)
        if: ${{ inputs.dataset == 'cvefixes' }}
        run: bash benchmarks/datasets/fetch_cvefixes.sh

      - name: Fetch Vul4J Cache (optional)
        if: ${{ inputs.dataset == 'vul4j' }}
        run: bash benchmarks/datasets/fetch_vul4j.sh

      - name: Prepare Git & Branch
        id: git_config
        run: |
          git config --global user.name "Security Agent Bot"
          git config --global user.email "bot@nyxfoundation.org"

          if [ -z "${{ inputs.branch }}" ]; then
            RUN_ID=$(date +'%Y%m%d-%H%M%S')
            BRANCH="benchmark-runs/${RUN_ID}"
            git checkout -b "${BRANCH}"
            echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          else
            echo "branch=${{ inputs.branch }}" >> $GITHUB_OUTPUT
          fi

      - name: Download Benchmark Dataset
        if: ${{ inputs.dataset == 'primevul' }}
        run: uv run python benchmarks/datasets/builders/setup_benchmark.py

      - name: Prepare CVEfixes Subset
        if: ${{ inputs.dataset == 'cvefixes' }}
        run: |
          uv run python benchmarks/datasets/builders/setup_cvefixes_subset.py

      - name: Prepare Vul4J Dataset
        if: ${{ inputs.dataset == 'vul4j' }}
        run: |
          uv run python benchmarks/datasets/builders/setup_vul4j_from_jsonl.py

      - name: Push Dataset
        if: always()
        run: |
          git add benchmarks/data/
          if ! git diff --staged --quiet; then
            git commit -m "benchmark: dataset setup (${{ inputs.dataset }})"
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin "${{ steps.git_config.outputs.branch }}" --force-with-lease
          fi

      - name: Summary
        run: |
          echo "## Next: Run **RQ2 Benchmark 02: Run Tools** (select all/semgrep/codeql)" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ steps.git_config.outputs.branch }}\`" >> $GITHUB_STEP_SUMMARY
