name: "RQ2 Benchmark 01: Setup Dataset"

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: "Dataset to prepare"
        required: true
        type: string
        default: "primevul"
      cvefixes_db_path:
        description: "Path to CVEfixes SQLite DB on runner (required for cvefixes)"
        required: false
        type: string
        default: ""
      cvefixes_repos:
        description: "Comma-separated repo filters for CVEfixes subset"
        required: false
        type: string
        default: ""
      cvefixes_output:
        description: "Output JSONL path for CVEfixes subset"
        required: false
        type: string
        default: "benchmarks/data/cvefixes/cvefixes_subset_paired.jsonl"
      vul4j_input_jsonl:
        description: "Path to Vul4J JSONL export on runner (required for vul4j)"
        required: false
        type: string
        default: ""
      vul4j_output:
        description: "Output JSONL path for Vul4J dataset"
        required: false
        type: string
        default: "benchmarks/data/vul4j/vul4j_paired.jsonl"
      branch:
        description: "Branch to use (leave empty to create new)"
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  setup-dataset:
    runs-on: self-hosted

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}
          fetch-depth: 0

      - name: Validate Dataset Selection
        run: |
          case "${{ inputs.dataset }}" in
            primevul|cvefixes|vul4j)
              echo "Dataset=${{ inputs.dataset }}"
              ;;
            *)
              echo "Unsupported dataset: ${{ inputs.dataset }}"
              exit 1
              ;;
          esac

      - name: Setup Python (uv)
        run: uv sync --python 3.11

      - name: Prepare Git & Branch
        id: git_config
        run: |
          git config --global user.name "Security Agent Bot"
          git config --global user.email "bot@nyxfoundation.org"

          if [ -z "${{ inputs.branch }}" ]; then
            RUN_ID=$(date +'%Y%m%d-%H%M%S')
            BRANCH="benchmark-runs/${RUN_ID}"
            git checkout -b "${BRANCH}"
            echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          else
            echo "branch=${{ inputs.branch }}" >> $GITHUB_OUTPUT
          fi

      - name: Download Benchmark Dataset
        if: ${{ inputs.dataset == 'primevul' }}
        run: uv run python scripts/setup_benchmark.py

      - name: Prepare CVEfixes Subset
        if: ${{ inputs.dataset == 'cvefixes' }}
        run: |
          if [ -z "${{ inputs.cvefixes_db_path }}" ]; then
            echo "cvefixes_db_path is required for cvefixes dataset."
            exit 1
          fi
          REPOS="${{ inputs.cvefixes_repos }}"
          if [ -z "$REPOS" ]; then
            echo "cvefixes_repos not provided; using script defaults."
            uv run python scripts/setup_cvefixes_subset.py \
              --db "${{ inputs.cvefixes_db_path }}" \
              --output "${{ inputs.cvefixes_output }}"
          else
            uv run python scripts/setup_cvefixes_subset.py \
              --db "${{ inputs.cvefixes_db_path }}" \
              --output "${{ inputs.cvefixes_output }}" \
              --repos "$REPOS"
          fi

      - name: Prepare Vul4J Dataset
        if: ${{ inputs.dataset == 'vul4j' }}
        run: |
          if [ -z "${{ inputs.vul4j_input_jsonl }}" ]; then
            echo "vul4j_input_jsonl is required for vul4j dataset."
            exit 1
          fi
          uv run python scripts/setup_vul4j_from_jsonl.py \
            --input "${{ inputs.vul4j_input_jsonl }}" \
            --output "${{ inputs.vul4j_output }}"

      - name: Push Dataset
        if: always()
        run: |
          git add benchmarks/data/
          if ! git diff --staged --quiet; then
            git commit -m "benchmark: dataset setup (${{ inputs.dataset }})"
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin "${{ steps.git_config.outputs.branch }}" --force-with-lease
          fi

      - name: Summary
        run: |
          echo "## Next: Run **RQ2 Benchmark 02: Run Tools** (select all/semgrep/codeql)" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ steps.git_config.outputs.branch }}\`" >> $GITHUB_STEP_SUMMARY
