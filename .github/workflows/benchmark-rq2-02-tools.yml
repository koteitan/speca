name: "RQ2 Benchmark 02: Run Tools"

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch from benchmark-01-setup"
        required: true
        type: string
      dataset:
        description: "Dataset to evaluate"
        required: true
        type: choice
        options:
          - primevul
          - cvefixes
          - vul4j
        default: "primevul"
      tools:
        description: "Tools to run (comma-separated or 'all')"
        required: true
        type: choice
        options:
          - all
          - semgrep
          - codeql
          - llm
          - static
          - security_agent
        default: "all"
      tool_timeout:
        description: "Per-sample timeout seconds for tool runners"
        required: false
        type: number
        default: 120
      dataset_run_id:
        description: "Run ID from benchmark-01-setup (for artifact download)"
        required: false
        type: string
        default: ""
      force_execute:
        description: "Force execute even if results exist"
        required: false
        type: boolean
        default: false
      security_agent_command:
        description: "security-agent command template ({code_path}, {output_path}, {case_id})"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  run-tools:
    runs-on: self-hosted

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Clean workspace (fix Docker root-owned files)
        run: |
          if [ -d "${{ github.workspace }}" ]; then
            sudo chown -R "$(id -u):$(id -g)" "${{ github.workspace }}" 2>/dev/null || true
          fi

      - name: Checkout Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Validate Dataset Selection
        run: |
          case "${{ inputs.dataset }}" in
            primevul|cvefixes|vul4j)
              echo "Dataset=${{ inputs.dataset }}"
              ;;
            *)
              echo "Unsupported dataset: ${{ inputs.dataset }}"
              exit 1
              ;;
          esac

      - name: Resolve Dataset Paths
        run: |
          case "${{ inputs.dataset }}" in
            primevul)
              DATASET_PATH="benchmarks/data/primevul/primevul_test_paired.jsonl"
              ;;
            cvefixes)
              DATASET_PATH="benchmarks/data/cvefixes/cvefixes_subset_paired.jsonl"
              ;;
            vul4j)
              DATASET_PATH="benchmarks/data/vul4j/vul4j_paired.jsonl"
              ;;
          esac
          echo "DATASET_PATH=${DATASET_PATH}" >> $GITHUB_ENV
          echo "RESULTS_DIR=benchmarks/results/rq2/${{ inputs.dataset }}" >> $GITHUB_ENV

      - name: Download Dataset Artifact
        if: ${{ inputs.dataset_run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          name: rq2-dataset-${{ inputs.dataset }}-${{ inputs.dataset_run_id }}
          path: benchmarks/data/${{ inputs.dataset }}/
        continue-on-error: true

      - name: Fallback to ~/.cache
        run: |
          CACHE_DIR="${HOME}/.cache/security-agent/benchmarks/${{ inputs.dataset }}"
          DEST_DIR="benchmarks/data/${{ inputs.dataset }}"
          if [ ! -f "${DATASET_PATH}" ] && [ -d "${CACHE_DIR}" ]; then
            echo "Restoring from ~/.cache..."
            mkdir -p "${DEST_DIR}"
            cp -rf "${CACHE_DIR}/." "${DEST_DIR}/"
          fi

      - name: Verify Dataset
        run: |
          if [ ! -f "${DATASET_PATH}" ]; then
            echo "Dataset missing at ${DATASET_PATH}. Run benchmark-01-setup first."
            exit 1
          fi

      - name: Setup Python (uv)
        run: uv sync --python 3.11

      - name: Resolve Tool Selection
        id: tool_select
        run: |
          TOOLS=$(echo "${{ inputs.tools }}" | tr '[:upper:]' '[:lower:]' | tr -d ' ')
          if [ -z "$TOOLS" ]; then
            echo "tools input cannot be empty."
            exit 1
          fi
          if [ "$TOOLS" = "all" ]; then
            echo "run_semgrep=true" >> $GITHUB_OUTPUT
            echo "run_codeql=true" >> $GITHUB_OUTPUT
            echo "run_security_agent=true" >> $GITHUB_OUTPUT
            echo "run_llm=true" >> $GITHUB_OUTPUT
            echo "run_static=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          if echo "$TOOLS" | grep -q "semgrep"; then
            echo "run_semgrep=true" >> $GITHUB_OUTPUT
          else
            echo "run_semgrep=false" >> $GITHUB_OUTPUT
          fi
          if echo "$TOOLS" | grep -q "codeql"; then
            echo "run_codeql=true" >> $GITHUB_OUTPUT
          else
            echo "run_codeql=false" >> $GITHUB_OUTPUT
          fi
          if echo "$TOOLS" | grep -Eq "security_agent|agent"; then
            echo "run_security_agent=true" >> $GITHUB_OUTPUT
          else
            echo "run_security_agent=false" >> $GITHUB_OUTPUT
          fi
          if echo "$TOOLS" | grep -q "llm"; then
            echo "run_llm=true" >> $GITHUB_OUTPUT
          else
            echo "run_llm=false" >> $GITHUB_OUTPUT
          fi
          if echo "$TOOLS" | grep -q "static"; then
            echo "run_static=true" >> $GITHUB_OUTPUT
          else
            echo "run_static=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Benchmark Image (Semgrep)
        if: steps.tool_select.outputs.run_semgrep == 'true'
        run: docker build -t security-agent-benchmark -f benchmarks/Dockerfile .

      - name: Run Semgrep
        id: run_semgrep
        if: steps.tool_select.outputs.run_semgrep == 'true'
        continue-on-error: true
        run: |
          if [ "${{ inputs.force_execute }}" != "true" ] && [ -f "${RESULTS_DIR}/semgrep_results.json" ]; then
            echo "Semgrep results already exist. Use force_execute to re-run."
            exit 0
          fi
          mkdir -p "${RESULTS_DIR}"
          docker run --rm --user "$(id -u):$(id -g)" -v "$PWD":/app -e PYTHONPATH=/app security-agent-benchmark \
            python3 /app/benchmarks/runners/run_semgrep.py \
              --dataset "/app/${DATASET_PATH}" \
              --output "/app/${RESULTS_DIR}/semgrep_results.json" \
              --config auto \
              --timeout "${{ inputs.tool_timeout }}"

      - name: Run CodeQL
        id: run_codeql
        if: steps.tool_select.outputs.run_codeql == 'true'
        continue-on-error: true
        run: |
          if [ "${{ inputs.force_execute }}" != "true" ] && [ -f "${RESULTS_DIR}/codeql_results.jsonl" ]; then
            echo "CodeQL results already exist. Use force_execute to re-run."
            exit 0
          fi
          if ! command -v codeql &>/dev/null; then
            echo "::warning::CodeQL CLI not found. Install it to run CodeQL benchmarks."
            echo "Skipping CodeQL."
            exit 0
          fi
          uv run python benchmarks/runners/run_codeql.py \
            --dataset "${DATASET_PATH}" \
            --output "${RESULTS_DIR}/codeql_results.jsonl" \
            --tmp-dir benchmarks/tmp/codeql \
            --timeout "${{ inputs.tool_timeout }}" \
            --shell

      - name: Run Security Agent
        id: run_security_agent
        if: steps.tool_select.outputs.run_security_agent == 'true'
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ "${{ inputs.force_execute }}" != "true" ] && \
             [ -f "${RESULTS_DIR}/security_agent_results.jsonl" ]; then
            echo "Security agent results already exist. Use force_execute to re-run."
            exit 0
          fi
          SA_CMD="${{ inputs.security_agent_command }}"
          if [ -z "${SA_CMD}" ]; then
            echo "::warning::No security_agent_command provided. Skipping security agent."
            echo "Skipping security agent (no command template)."
            exit 0
          fi
          uv run python benchmarks/runners/run_security_agent.py \
            --dataset "${DATASET_PATH}" \
            --output "${RESULTS_DIR}/security_agent_results.jsonl" \
            --tmp-dir benchmarks/tmp/security_agent \
            --command "${SA_CMD}" \
            --shell \
            --timeout "${{ inputs.tool_timeout }}"

      - name: Run LLM Baseline
        id: run_llm
        if: steps.tool_select.outputs.run_llm == 'true'
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ inputs.force_execute }}" != "true" ] && [ -f "${RESULTS_DIR}/llm_baseline_results.jsonl" ]; then
            echo "LLM baseline results already exist. Use force_execute to re-run."
            exit 0
          fi
          # Unset CLAUDECODE to allow nested claude CLI invocation
          unset CLAUDECODE
          uv run python benchmarks/runners/run_llm_baseline.py \
            --dataset "${DATASET_PATH}" \
            --output "${RESULTS_DIR}/llm_baseline_results.jsonl" \
            --tmp-dir benchmarks/tmp/llm_baseline \
            --timeout "${{ inputs.tool_timeout }}" \
            --shell

      - name: Run Static Baseline
        id: run_static
        if: steps.tool_select.outputs.run_static == 'true'
        continue-on-error: true
        run: |
          if [ "${{ inputs.force_execute }}" != "true" ] && [ -f "${RESULTS_DIR}/static_baseline_results.jsonl" ]; then
            echo "Static baseline results already exist. Use force_execute to re-run."
            exit 0
          fi
          if ! command -v infer &>/dev/null; then
            echo "::warning::Infer not found. Install Facebook Infer to run static baseline benchmarks."
            echo "Skipping static baseline."
            exit 0
          fi
          uv run python benchmarks/runners/run_static_baseline.py \
            --dataset "${DATASET_PATH}" \
            --output "${RESULTS_DIR}/static_baseline_results.jsonl" \
            --tmp-dir benchmarks/tmp/static_baseline \
            --timeout "${{ inputs.tool_timeout }}" \
            --shell

      - name: Check Tool Runner Outcomes
        if: always()
        run: |
          FAILED=""
          if [ "${{ steps.run_semgrep.outcome }}" = "failure" ]; then
            FAILED="${FAILED} semgrep"
          fi
          if [ "${{ steps.run_codeql.outcome }}" = "failure" ]; then
            FAILED="${FAILED} codeql"
          fi
          if [ "${{ steps.run_security_agent.outcome }}" = "failure" ]; then
            FAILED="${FAILED} security_agent"
          fi
          if [ "${{ steps.run_llm.outcome }}" = "failure" ]; then
            FAILED="${FAILED} llm"
          fi
          if [ "${{ steps.run_static.outcome }}" = "failure" ]; then
            FAILED="${FAILED} static"
          fi
          if [ -n "$FAILED" ]; then
            echo "::warning::The following tool runners failed:${FAILED}"
            echo "### Tool Runner Failures" >> $GITHUB_STEP_SUMMARY
            echo "The following tool runners failed:${FAILED}" >> $GITHUB_STEP_SUMMARY
          else
            echo "All executed tool runners succeeded."
          fi

      - name: Save Results to Cache
        if: always()
        run: |
          CACHE_DIR="${HOME}/.cache/security-agent/benchmarks/results/${{ inputs.dataset }}"
          mkdir -p "${CACHE_DIR}"
          if [ -d "${RESULTS_DIR}" ]; then
            cp -rf "${RESULTS_DIR}/." "${CACHE_DIR}/"
            echo "Saved results to ${CACHE_DIR}"
          fi

      - name: Upload Results Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rq2-tool-results-${{ inputs.dataset }}-${{ inputs.tools }}-${{ github.run_id }}
          path: benchmarks/results/rq2/${{ inputs.dataset }}/
          retention-days: 30
          if-no-files-found: warn

      - name: Summary
        run: |
          echo "## RQ2 Benchmark 02: Tool Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: \`${{ inputs.branch }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Dataset: \`${{ inputs.dataset }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Tools: \`${{ inputs.tools }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Results artifact: \`rq2-tool-results-${{ inputs.dataset }}-${{ inputs.tools }}-${{ github.run_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next: Run **RQ2 Benchmark 03: Evaluate**" >> $GITHUB_STEP_SUMMARY
