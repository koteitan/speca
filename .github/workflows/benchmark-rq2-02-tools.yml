name: "RQ2 Benchmark 02: Run Tools"

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch from benchmark-01-setup"
        required: true
        type: string
      dataset:
        description: "Dataset to evaluate"
        required: true
        type: string
        default: "primevul"
      tools:
        description: "Tools to run (all | semgrep | codeql | comma-separated list)"
        required: true
        type: string
        default: "all"
      codeql_command:
        description: "Command template for CodeQL runner (use {code_path} {output_path} {case_id})"
        required: false
        type: string
        default: ""
      force_execute:
        description: "Force execute even if results exist"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  run-tools:
    runs-on: self-hosted

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Validate Dataset Selection
        run: |
          if [ "${{ inputs.dataset }}" != "primevul" ]; then
            echo "Only primevul is supported right now."
            exit 1
          fi

      - name: Verify Dataset
        run: |
          if [ ! -f "benchmarks/data/primevul/primevul_test_paired.jsonl" ]; then
            echo "Dataset missing. Run benchmark-01-setup first."
            exit 1
          fi

      - name: Resolve Tool Selection
        id: tool_select
        run: |
          TOOLS=$(echo "${{ inputs.tools }}" | tr '[:upper:]' '[:lower:]' | tr -d ' ')
          if [ -z "$TOOLS" ]; then
            echo "tools input cannot be empty."
            exit 1
          fi
          if [ "$TOOLS" = "all" ]; then
            echo "run_semgrep=true" >> $GITHUB_OUTPUT
            echo "run_codeql=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          if echo "$TOOLS" | grep -q "semgrep"; then
            echo "run_semgrep=true" >> $GITHUB_OUTPUT
          else
            echo "run_semgrep=false" >> $GITHUB_OUTPUT
          fi
          if echo "$TOOLS" | grep -q "codeql"; then
            echo "run_codeql=true" >> $GITHUB_OUTPUT
          else
            echo "run_codeql=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Benchmark Image (Semgrep)
        if: steps.tool_select.outputs.run_semgrep == 'true'
        run: docker build -t security-agent-benchmark -f benchmarks/Dockerfile .

      - name: Run Semgrep
        if: steps.tool_select.outputs.run_semgrep == 'true'
        run: |
          if [ "${{ inputs.force_execute }}" != "true" ] && [ -f "benchmarks/results/primevul/semgrep_results.json" ]; then
            echo "Semgrep results already exist. Use force_execute to re-run."
            exit 0
          fi
          docker run --rm -v "$PWD":/app security-agent-benchmark \
            python3 /app/benchmarks/runners/run_semgrep.py

      - name: Run CodeQL
        if: steps.tool_select.outputs.run_codeql == 'true'
        run: |
          if [ -z "${{ inputs.codeql_command }}" ]; then
            echo "codeql_command is required when codeql is selected."
            exit 1
          fi
          if [ "${{ inputs.force_execute }}" != "true" ] && [ -f "benchmarks/results/primevul/codeql_results.jsonl" ]; then
            echo "CodeQL results already exist. Use force_execute to re-run."
            exit 0
          fi
          python3 benchmarks/runners/run_codeql.py \
            --dataset "benchmarks/data/primevul/primevul_test_paired.jsonl" \
            --output "benchmarks/results/primevul/codeql_results.jsonl" \
            --command "${{ inputs.codeql_command }}" \
            --shell

      - name: Push Results
        if: always()
        run: |
          git add benchmarks/results/
          if ! git diff --staged --quiet; then
            git commit -m "benchmark: tool results"
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin "${{ inputs.branch }}" --force-with-lease
          fi

      - name: Summary
        run: |
          echo "## Next: Run **RQ2 Benchmark 03: Evaluate**" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ inputs.branch }}\`" >> $GITHUB_STEP_SUMMARY
