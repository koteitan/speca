name: "RQ2 Benchmark 03: Evaluate"

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch from benchmark-02-semgrep"
        required: true
        type: string
      dataset:
        description: "Dataset to evaluate"
        required: true
        type: string
        default: "primevul"

permissions:
  contents: write

jobs:
  evaluate:
    runs-on: self-hosted

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Validate Dataset Selection
        run: |
          if [ "${{ inputs.dataset }}" != "primevul" ]; then
            echo "Only primevul is supported right now."
            exit 1
          fi

      - name: Verify Inputs
        run: |
          if [ ! -f "benchmarks/data/primevul/primevul_test_paired.jsonl" ]; then
            echo "Dataset missing. Run benchmark-01-setup first."
            exit 1
          fi
          if ! ls benchmarks/results/primevul/*_results.* >/dev/null 2>&1; then
            echo "No tool results found. Run benchmark-02-tools first."
            exit 1
          fi

      - name: Setup Python (uv)
        run: uv sync --python 3.11

      - name: Evaluate Benchmark
        run: uv run python benchmarks/evaluate.py

      - name: Push Evaluation Summary
        if: always()
        run: |
          git add benchmarks/results/evaluation_summary.json
          if ! git diff --staged --quiet; then
            git commit -m "benchmark: evaluation summary"
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin "${{ inputs.branch }}" --force-with-lease
          fi
