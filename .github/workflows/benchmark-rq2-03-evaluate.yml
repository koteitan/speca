name: "RQ2 Benchmark 03: Evaluate"

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch from benchmark-02-tools"
        required: true
        type: string
      dataset:
        description: "Dataset to evaluate"
        required: true
        type: choice
        options:
          - primevul
          - cvefixes
          - vul4j
        default: "primevul"
      tools_run_id:
        description: "Run ID from benchmark-02-tools (for artifact download)"
        required: false
        type: string
        default: ""
      rq1_summary:
        description: "Path to RQ1 evaluation_summary.json (optional, for combined report)"
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  evaluate:
    runs-on: self-hosted

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Validate Dataset Selection
        run: |
          case "${{ inputs.dataset }}" in
            primevul|cvefixes|vul4j)
              echo "Dataset=${{ inputs.dataset }}"
              ;;
            *)
              echo "Unsupported dataset: ${{ inputs.dataset }}"
              exit 1
              ;;
          esac

      - name: Resolve Dataset Paths
        run: |
          case "${{ inputs.dataset }}" in
            primevul)
              DATASET_PATH="benchmarks/data/primevul/primevul_test_paired.jsonl"
              ;;
            cvefixes)
              DATASET_PATH="benchmarks/data/cvefixes/cvefixes_subset_paired.jsonl"
              ;;
            vul4j)
              DATASET_PATH="benchmarks/data/vul4j/vul4j_paired.jsonl"
              ;;
          esac
          echo "DATASET_PATH=${DATASET_PATH}" >> $GITHUB_ENV
          echo "RESULTS_DIR=benchmarks/results/rq2/${{ inputs.dataset }}" >> $GITHUB_ENV

      - name: Download Tool Results Artifact
        if: ${{ inputs.tools_run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          pattern: rq2-tool-results-${{ inputs.dataset }}-*-${{ inputs.tools_run_id }}
          path: benchmarks/results/rq2/${{ inputs.dataset }}/
          merge-multiple: true
        continue-on-error: true

      - name: Fallback to ~/.cache (Dataset)
        run: |
          CACHE_DIR="${HOME}/.cache/security-agent/benchmarks/${{ inputs.dataset }}"
          DEST_DIR="benchmarks/data/${{ inputs.dataset }}"
          if [ ! -f "${DATASET_PATH}" ] && [ -d "${CACHE_DIR}" ]; then
            echo "Restoring dataset from ~/.cache..."
            mkdir -p "${DEST_DIR}"
            cp -rf "${CACHE_DIR}/." "${DEST_DIR}/"
          fi

      - name: Fallback to ~/.cache (Results)
        run: |
          CACHE_DIR="${HOME}/.cache/security-agent/benchmarks/results/${{ inputs.dataset }}"
          DEST_DIR="benchmarks/results/rq2/${{ inputs.dataset }}"
          if ! ls "${DEST_DIR}"/*_results.* >/dev/null 2>&1 && [ -d "${CACHE_DIR}" ]; then
            echo "Restoring results from ~/.cache..."
            mkdir -p "${DEST_DIR}"
            cp -rf "${CACHE_DIR}/." "${DEST_DIR}/"
          fi

      - name: Verify Inputs
        run: |
          if [ ! -f "${DATASET_PATH}" ]; then
            echo "Dataset missing at ${DATASET_PATH}. Run benchmark-01-setup first."
            exit 1
          fi
          if ! ls benchmarks/results/rq2/${{ inputs.dataset }}/*_results.* >/dev/null 2>&1; then
            echo "No tool results found. Run benchmark-02-tools first."
            exit 1
          fi

      - name: Setup Python (uv)
        run: uv sync --python 3.11 --group benchmark

      - name: Evaluate Benchmark
        run: uv run python benchmarks/rq2/evaluate.py --dataset "${{ inputs.dataset }}" --dataset-path "${DATASET_PATH}"

      - name: Generate Report
        run: |
          RQ1_ARG=""
          if [ -n "${{ inputs.rq1_summary }}" ] && [ -f "${{ inputs.rq1_summary }}" ]; then
            RQ1_ARG="--rq1-summary ${{ inputs.rq1_summary }}"
          fi
          uv run python benchmarks/rq2/generate_report.py \
            --metrics benchmarks/results/rq2/metrics.json \
            --output benchmarks/results/rq2/report.md \
            ${RQ1_ARG}

      - name: Generate Visualizations
        continue-on-error: true
        run: |
          uv run python benchmarks/rq2/visualize.py \
            --metrics benchmarks/results/rq2/metrics.json \
            --output-dir benchmarks/results/rq2/figures

      - name: Save Evaluation to Cache
        if: always()
        run: |
          CACHE_DIR="${HOME}/.cache/security-agent/benchmarks/results/${{ inputs.dataset }}"
          mkdir -p "${CACHE_DIR}"
          for f in evaluation_summary.json metrics.json report.md; do
            if [ -f "benchmarks/results/rq2/${f}" ]; then
              cp "benchmarks/results/rq2/${f}" "${CACHE_DIR}/${f}"
            fi
          done
          if [ -d "benchmarks/results/rq2/figures" ]; then
            cp -rf "benchmarks/results/rq2/figures" "${CACHE_DIR}/figures"
          fi
          echo "Saved evaluation results to ${CACHE_DIR}"

      - name: Upload Evaluation Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rq2-evaluation-${{ inputs.dataset }}-${{ github.run_id }}
          path: |
            benchmarks/results/rq2/evaluation_summary.json
            benchmarks/results/rq2/metrics.json
            benchmarks/results/rq2/report.md
            benchmarks/results/rq2/figures/
          retention-days: 90
          if-no-files-found: warn

      - name: Prepare Git
        run: |
          git config --local user.name "Security Agent Bot"
          git config --local user.email "bot@nyxfoundation.org"

      - name: Push Evaluation Results
        if: success() || failure()
        run: |
          git add benchmarks/results/rq2/
          if ! git diff --staged --quiet; then
            git commit -m "benchmark: rq2 evaluation for ${{ inputs.dataset }}"
            git push origin "${{ inputs.branch }}" --force-with-lease
          fi

      - name: Print Report Summary
        if: always()
        run: |
          echo "## RQ2 Benchmark Report (${{ inputs.dataset }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "benchmarks/results/rq2/report.md" ]; then
            cat benchmarks/results/rq2/report.md >> $GITHUB_STEP_SUMMARY
          else
            echo "Report generation failed. Check evaluation_summary.json for raw metrics." >> $GITHUB_STEP_SUMMARY
          fi
