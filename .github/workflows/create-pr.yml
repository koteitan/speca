name: "Create PR"

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to create PR from (required)'
        required: true
        type: string
      base_branch:
        description: 'Base branch for PR (default: master)'
        required: false
        type: string
        default: 'master'
      pr_type:
        description: 'Type of PR'
        required: true
        type: choice
        options:
          - preparation
          - audit
      target_repo:
        description: 'Target repository (for audit PRs only)'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Extract Run Info
        id: info
        run: |
          # Extract run ID from branch name
          RUN_ID=$(echo "${{ inputs.branch }}" | sed 's|.*/||')
          echo "run_id=${RUN_ID}" >> $GITHUB_OUTPUT

          # Count outputs
          SPEC_FILES=$(ls outputs/01*.json 2>/dev/null | wc -l || echo 0)
          CHECKLIST_FILES=$(ls outputs/02*.json 2>/dev/null | wc -l || echo 0)
          AUDIT_FILES=$(ls outputs/03*.json 2>/dev/null | wc -l || echo 0)
          REVIEW_FILES=$(ls outputs/04*.json 2>/dev/null | wc -l || echo 0)

          echo "spec_files=${SPEC_FILES}" >> $GITHUB_OUTPUT
          echo "checklist_files=${CHECKLIST_FILES}" >> $GITHUB_OUTPUT
          echo "audit_files=${AUDIT_FILES}" >> $GITHUB_OUTPUT
          echo "review_files=${REVIEW_FILES}" >> $GITHUB_OUTPUT

      - name: Create Preparation PR
        if: ${{ inputs.pr_type == 'preparation' }}
        run: |
          gh pr create \
            --base "${{ inputs.base_branch }}" \
            --head "${{ inputs.branch }}" \
            --title "Preparation Report: ${{ steps.info.outputs.run_id }}" \
            --body "$(cat <<'EOF'
          ## Preparation Phase Results

          ### Outputs Generated
          - Specification files: ${{ steps.info.outputs.spec_files }}
          - Checklist files: ${{ steps.info.outputs.checklist_files }}

          ### Files
          - `outputs/01a_STATE.json` - URL work queue
          - `outputs/01_SPEC.json` - Integrated specification
          - `outputs/01d_TRUSTMODEL.json` - Trust model
          - `outputs/01e_PROP.json` - Security properties
          - `outputs/02s_REVIEW_REPORT.json` - Preparation review
          - `outputs/02_CHECKLIST_PARTIAL_*.json` - Unified checklist partials

          ---
          *Generated by Security Agent (Run: ${{ github.run_id }})*
          EOF
          )" \
            || echo "PR may already exist."

      - name: Create Audit PR
        if: ${{ inputs.pr_type == 'audit' }}
        run: |
          gh pr create \
            --base "${{ inputs.base_branch }}" \
            --head "${{ inputs.branch }}" \
            --title "Audit Report: ${{ inputs.target_repo }} (${{ steps.info.outputs.run_id }})" \
            --body "$(cat <<'EOF'
          ## Audit Phase Results

          **Target:** ${{ inputs.target_repo }}

          ### Outputs Generated
          - Audit map files: ${{ steps.info.outputs.audit_files }}
          - Review files: ${{ steps.info.outputs.review_files }}

          ### Files
          - `outputs/03_AUDITMAP_PARTIAL_*.json` - Audit findings
          - `outputs/03_STATE.json` - Audit map state
          - `outputs/04_REVIEW_PARTIAL_*.json` - Reviewed findings
          - `outputs/04_STATE.json` - Review state

          ---
          *Generated by Security Agent (Run: ${{ github.run_id }})*
          EOF
          )" \
            || echo "PR may already exist."

      - name: Output PR Link
        run: |
          echo "## Pull Request" >> $GITHUB_STEP_SUMMARY
          PR_URL=$(gh pr view "${{ inputs.branch }}" --json url -q '.url' 2>/dev/null || echo "")
          if [ -n "$PR_URL" ]; then
            echo "Created/Found PR: ${PR_URL}" >> $GITHUB_STEP_SUMMARY
          else
            echo "PR creation may have failed. Check the logs." >> $GITHUB_STEP_SUMMARY
          fi
