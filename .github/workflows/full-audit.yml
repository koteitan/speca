name: "hiro Full Audit Pipeline"

on:
  workflow_dispatch:
    inputs:
      bug_bounty_url:
        description: 'Bug bounty program URL (e.g., https://immunefi.com/bounty/ethereum)'
        required: true
        type: string
      target_repo:
        description: 'Target repository (owner/repo)'
        required: true
        type: string
      target_ref:
        description: 'Target ref: branch name or commit hash (leave empty for default branch)'
        required: false
        type: string
        default: ''
      contract_addresses:
        description: 'In-scope contract addresses (one per line or comma-separated, leave empty for auto-extract)'
        required: false
        type: string
        default: ''
      spec_urls:
        description: 'Override: Specification URLs (comma-separated, leave empty for auto-extract)'
        required: false
        type: string
        default: ''
      keywords:
        description: 'Override: Keywords (comma-separated, leave empty for auto-extract)'
        required: false
        type: string
        default: ''
      workers:
        description: 'Number of parallel workers'
        required: false
        type: number
        default: 4
      max_concurrent:
        description: 'Max concurrent Claude calls'
        required: false
        type: number
        default: 64

permissions:
  contents: write

jobs:
  full-audit:
    runs-on: self-hosted

    env:
      CLAUDE_CODE_PERMISSIONS: bypassPermissions
      CLAUDE_CODE_MAX_OUTPUT_TOKENS: 100000

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: |
          if command -v claude >/dev/null 2>&1; then
            echo "claude already installed; skipping"
          else
            npm install -g @anthropic-ai/claude-code
          fi

      - name: Setup MCP Servers
        run: FILESYSTEM_DIRS="." bash scripts/setup_mcp.sh
        env:
          GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Git & Branch
        id: git_config
        run: |
          git config --local user.name "Security Agent Bot"
          git config --local user.email "bot@nyxfoundation.org"

          TARGET_NAME=$(echo "${{ inputs.target_repo }}" | sed 's|/|-|g')
          RUN_ID=$(date +'%Y%m%d-%H%M%S')
          BRANCH="audit/${TARGET_NAME}/${RUN_ID}"
          git checkout -b "${BRANCH}"
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT

      - name: "Pre-flight: Schema & Config Tests"
        run: uv run python3 -m pytest tests/ -v --tb=short

      # --- Step 0: Scope & Target Setup ---

      - name: "Step 0a: Extract Bug Bounty Scope"
        run: |
          CONTRACT_ADDRS="${{ inputs.contract_addresses }}"
          ADDR_CONTEXT=""
          if [ -n "${CONTRACT_ADDRS}" ]; then
            ADDR_CONTEXT="Additional in-scope contract addresses provided by user: ${CONTRACT_ADDRS}"
          fi

          claude --print "
          Read the bug bounty program page at ${{ inputs.bug_bounty_url }} and create outputs/BUG_BOUNTY_SCOPE.json with:
          {
            \"program_url\": \"${{ inputs.bug_bounty_url }}\",
            \"program_name\": \"<name>\",
            \"in_scope_assets\": [\"<assets - include repos, contract addresses, and file paths>\"],
            \"in_scope_contracts\": [{\"address\": \"0x...\", \"network\": \"ethereum|base|...\", \"name\": \"<if available>\"}],
            \"out_of_scope\": [\"<excluded>\"],
            \"severity_ratings\": \"<if available>\",
            \"reward_range\": \"<if available>\",
            \"notes\": \"<special rules>\"
          }
          IMPORTANT: Many bug bounty programs (e.g., Sherlock, Immunefi) define scope using:
          - Specific repository URLs with commit hashes
          - Smart contract addresses on various networks (Ethereum, Base, Arbitrum, etc.)
          - Specific file paths within repositories
          Extract ALL of these. For contract addresses, include the network and contract name if available.
          ${ADDR_CONTEXT}
          Also extract specification URLs and keywords for Phase 01a discovery.
          Write them to outputs/EXTRACTED_INPUTS.json:
          {
            \"spec_urls\": \"<comma-separated URLs>\",
            \"keywords\": \"<comma-separated keywords>\"
          }
          " | claude --dangerously-skip-permissions
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: "Step 0b: Checkout Target Repository"
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.target_repo }}
          ref: ${{ inputs.target_ref || '' }}
          fetch-depth: 0
          path: target_workspace
          persist-credentials: false

      - name: "Step 0c: Create TARGET_INFO.json"
        working-directory: ./target_workspace
        run: |
          set -euo pipefail
          DEFAULT_BRANCH="$(git symbolic-ref refs/remotes/origin/HEAD 2>/dev/null | sed 's@^refs/remotes/origin/@@' || echo main)"
          TARGET_REF="${{ inputs.target_ref }}"
          REF_LABEL="${TARGET_REF:-${DEFAULT_BRANCH}}"
          COMMIT="$(git rev-parse HEAD)"
          COMMIT_SHORT="$(git rev-parse --short HEAD)"

          cat > ../outputs/TARGET_INFO.json <<JSON
          {
            "target_repo": "${{ inputs.target_repo }}",
            "target_ref": "${REF_LABEL}",
            "target_ref_label": "${REF_LABEL}",
            "target_commit": "${COMMIT}",
            "target_commit_short": "${COMMIT_SHORT}"
          }
          JSON

          echo "TARGET_INFO.json created:"
          cat ../outputs/TARGET_INFO.json

      - name: "Step 0d: Resolve Inputs"
        id: inputs
        run: |
          if [ -n "${{ inputs.spec_urls }}" ]; then
            echo "spec_urls=${{ inputs.spec_urls }}" >> $GITHUB_OUTPUT
          elif [ -f outputs/EXTRACTED_INPUTS.json ]; then
            URLS=$(python3 -c "import json; print(json.load(open('outputs/EXTRACTED_INPUTS.json'))['spec_urls'])")
            echo "spec_urls=${URLS}" >> $GITHUB_OUTPUT
          else
            echo "::error::No spec_urls provided and auto-extraction failed"
            exit 1
          fi

          if [ -n "${{ inputs.keywords }}" ]; then
            echo "keywords=${{ inputs.keywords }}" >> $GITHUB_OUTPUT
          elif [ -f outputs/EXTRACTED_INPUTS.json ]; then
            KW=$(python3 -c "import json; print(json.load(open('outputs/EXTRACTED_INPUTS.json'))['keywords'])")
            echo "keywords=${KW}" >> $GITHUB_OUTPUT
          else
            echo "::error::No keywords provided and auto-extraction failed"
            exit 1
          fi

      - name: Commit Setup Files
        run: |
          git add outputs/BUG_BOUNTY_SCOPE.json outputs/TARGET_INFO.json
          git add outputs/EXTRACTED_INPUTS.json 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "audit: setup scope and target info"
            git push origin "${{ steps.git_config.outputs.branch }}" --force-with-lease
          fi

      # --- Phase 01a: Spec Discovery ---

      - name: "Phase 01a: Spec Discovery"
        run: |
          uv run python3 scripts/run_phase.py --phase 01a
        env:
          KEYWORDS: ${{ steps.inputs.outputs.keywords }}
          SPEC_URLS: ${{ steps.inputs.outputs.spec_urls }}
          GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push 01a Results
        if: success() || failure()
        run: |
          git add outputs/ ':!outputs/logs/'
          if ! git diff --staged --quiet; then
            git add outputs/logs/
            git commit -m "01a: discovery complete"
            git push origin "${{ steps.git_config.outputs.branch }}" --force-with-lease
          fi

      # --- Phase 01b: Subgraph Extraction ---

      - name: "Phase 01b: Subgraph Extraction"
        run: |
          uv run python3 scripts/run_phase.py --phase 01b \
            --workers ${{ inputs.workers }}

      - name: Push 01b Results
        if: success() || failure()
        run: |
          git add outputs/ ':!outputs/logs/'
          if ! git diff --staged --quiet; then
            git add outputs/logs/
            git commit -m "01b: subgraph extraction complete"
            git push origin "${{ steps.git_config.outputs.branch }}" --force-with-lease
          fi

      # --- Phase 01e: Property Generation ---

      - name: "Phase 01e: Property Generation"
        run: |
          uv run python3 scripts/run_phase.py --phase 01e \
            --workers ${{ inputs.workers }}

      - name: Push 01e Results
        if: success() || failure()
        run: |
          git add outputs/ ':!outputs/logs/'
          if ! git diff --staged --quiet; then
            git add outputs/logs/
            git commit -m "01e: property generation complete"
            git push origin "${{ steps.git_config.outputs.branch }}" --force-with-lease
          fi

      # --- Phase 02c: Code Pre-resolution ---

      - name: "Phase 02c: Code Pre-resolution"
        run: |
          uv run python3 scripts/run_phase.py --phase 02c \
            --workers ${{ inputs.workers }} \
            --max-concurrent ${{ inputs.max_concurrent }}
        env:
          GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push 02c Results
        if: success() || failure()
        run: |
          git add outputs/ ':!outputs/logs/'
          if ! git diff --staged --quiet; then
            git add outputs/logs/
            git commit -m "02c: code pre-resolution complete"
            git push origin "${{ steps.git_config.outputs.branch }}" --force-with-lease
          fi

      # --- Phase 03: Audit Map ---

      - name: "Phase 03: Audit Map"
        run: |
          uv run python3 scripts/run_phase.py --phase 03 \
            --workers ${{ inputs.workers }} \
            --max-concurrent ${{ inputs.max_concurrent }}

      - name: Push 03 Results
        if: success() || failure()
        run: |
          git add outputs/ ':!outputs/logs/'
          if ! git diff --staged --quiet; then
            git add outputs/logs/
            git commit -m "03: audit complete"
            git push origin "${{ steps.git_config.outputs.branch }}" --force-with-lease
          fi

      # --- Phase 04: Review ---

      - name: "Phase 04: Review"
        run: |
          uv run python3 scripts/run_phase.py --phase 04 \
            --workers ${{ inputs.workers }} \
            --max-concurrent ${{ inputs.max_concurrent }}

      - name: Push 04 Results
        if: success() || failure()
        run: |
          git add outputs/ ':!outputs/logs/'
          if ! git diff --staged --quiet; then
            git add outputs/logs/
            git commit -m "04: review complete"
            git push origin "${{ steps.git_config.outputs.branch }}" --force-with-lease
          fi

      # --- Summary ---

      - name: Generate Summary
        if: always()
        run: |
          echo "## Audit Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Target | \`${{ inputs.target_repo }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Bug Bounty | ${{ inputs.bug_bounty_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ steps.git_config.outputs.branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Count outputs per phase
          for phase in 01a 01b 01e 02c 03 04; do
            count=$(ls outputs/${phase}_PARTIAL_*.json 2>/dev/null | wc -l | tr -d ' ')
            echo "| Phase ${phase} partials | ${count} files |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View results in the web client:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "git checkout ${{ steps.git_config.outputs.branch }}" >> $GITHUB_STEP_SUMMARY
          echo "cd web && npm install && npm run dev" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload All Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-logs-${{ github.run_id }}
          path: outputs/logs/
          retention-days: 14
