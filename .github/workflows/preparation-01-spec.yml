name: "Prep 01: Specification Extraction"

on:
  workflow_dispatch:
    inputs:
      keywords:
        description: 'Keywords for specification extraction (comma-separated)'
        required: true
        type: string
        default: 'geth,ethereum client,execution specs,EIP'
      spec_urls:
        description: 'Specification URLs (comma-separated)'
        required: true
        type: string
        default: 'https://ethereum.github.io/execution-specs/src/,https://geth.ethereum.org/docs'
      max_iterations:
        description: 'Safety limit for loop iterations'
        required: false
        type: number
        default: 100
      workers:
        description: 'Number of parallel workers'
        required: false
        type: number
        default: 4
      branch:
        description: 'Branch to use (leave empty to create new)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  spec-extraction:
    runs-on: self-hosted

    env:
      KEYWORDS: ${{ inputs.keywords }}
      SPEC_URLS: ${{ inputs.spec_urls }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CLAUDE_CODE_PERMISSIONS: bypassPermissions
      CLAUDE_CODE_MAX_OUTPUT_TOKENS: 100000

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Prepare Git & Branch
        id: git_config
        run: |
          git config --global user.name "Security Agent Bot"
          git config --global user.email "bot@nyxfoundation.org"

          if [ -z "${{ inputs.branch }}" ]; then
            RUN_ID=$(date +'%Y%m%d-%H%M%S')
            BRANCH="prep-runs/${RUN_ID}"
            git checkout -b "${BRANCH}"
            echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
            echo "Created new branch: ${BRANCH}"
          else
            echo "branch=${{ inputs.branch }}" >> $GITHUB_OUTPUT
            echo "Using existing branch: ${{ inputs.branch }}"
          fi

      - name: "Step 01a: Discovery & Queuing"
        run: |
          make 01a \
            KEYWORDS="${{ env.KEYWORDS }}" \
            SPEC_URLS="${{ env.SPEC_URLS }}"

      - name: "Step 01b: Extraction (Parallel)"
        run: |
          make 01b-parallel \
            WORKERS=${{ inputs.workers }} \
            MAX_ITERATIONS=${{ inputs.max_iterations }}

      - name: "Step 01c: Integration"
        run: make 01c

      - name: "Step 01d: Trust Model"
        run: make 01d

      - name: "Step 01e: Properties"
        run: make 01e

      - name: Push Results
        if: always()
        run: |
          git add outputs/

          if ! git diff --staged --quiet; then
            git commit -m "$(cat <<'EOF'
          prep(01): specification extraction complete

          Keywords: ${{ env.KEYWORDS }}
          Workers: ${{ inputs.workers }}
          EOF
          )"

            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin "${{ steps.git_config.outputs.branch }}" --force-with-lease
            echo "Pushed to branch: ${{ steps.git_config.outputs.branch }}"
          else
            echo "No changes to commit"
          fi

      - name: Output Branch Name
        run: |
          echo "## Branch for next step" >> $GITHUB_STEP_SUMMARY
          echo "\`${{ steps.git_config.outputs.branch }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run **Prep 02: Checklist Generation** with this branch name." >> $GITHUB_STEP_SUMMARY

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: prep-01-logs-${{ github.run_id }}
          path: outputs/logs/
          retention-days: 7
