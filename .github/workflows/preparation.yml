name: Security Audit - Preparation

on:
  workflow_dispatch:
    inputs:
      keywords:
        description: 'Keywords for specification extraction (comma-separated)'
        required: true
        type: string
        default: 'geth,ethereum client,execution specs,EIP'
      spec_urls:
        description: 'Specification URLs (comma-separated)'
        required: true
        type: string
        default: 'https://ethereum.github.io/execution-specs/src/,https://geth.ethereum.org/docs'
      spec_retry_iterations:
        description: 'Number of specification retry iterations (01a)'
        required: false
        type: number
        default: 10
      checklist_iterations:
        description: 'Number of checklist iterations (02b)'
        required: false
        type: number
        default: 10
      create_pr:
        description: 'Create Pull Request (if unchecked, push directly to current branch)'
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  preparation:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'Merge')"

    env:
      KEYWORDS: ${{ inputs.keywords }}
      SPEC_URLS: ${{ inputs.spec_urls }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CLAUDE_CODE_MAX_OUTPUT_TOKENS: 100000

    steps:
      - name: Checkout Security Agent (Self)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Get Run Info
        id: run_info
        run: |
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          echo "run_id=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Run Preparation Phase
        run: |
          make preparation \
            KEYWORDS="${{ env.KEYWORDS }}" \
            SPEC_URLS="${{ env.SPEC_URLS }}" \
            SPEC_RETRY_ITERATIONS=${{ inputs.spec_retry_iterations }} \
            CHECKLIST_ITERATIONS=${{ inputs.checklist_iterations }}

      - name: Prepare Git Configuration
        id: git_config
        run: |
          git config --global user.name "Security Agent Bot"
          git config --global user.email "bot@nyxfoundation.org"

          SNAPSHOT_BRANCH="prep-runs/${{ steps.run_info.outputs.run_id }}"

          echo "run_id=${{ steps.run_info.outputs.run_id }}" >> $GITHUB_OUTPUT
          echo "snapshot_branch=${SNAPSHOT_BRANCH}" >> $GITHUB_OUTPUT
          echo "base_branch=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Create Branch and Push (PR mode)
        if: ${{ inputs.create_pr == true }}
        run: |
          git checkout -b "${{ steps.git_config.outputs.snapshot_branch }}"
          git add outputs/

          if ! git diff --staged --quiet; then
            git commit -m "$(cat <<'EOF'
          prep: specification research snapshot

          Keywords: ${{ env.KEYWORDS }}
          Spec URLs: ${{ env.SPEC_URLS }}
          Spec Retry Iterations: ${{ inputs.spec_retry_iterations }}
          Checklist Iterations: ${{ inputs.checklist_iterations }}
          Run ID: ${{ github.run_id }}
          EOF
          )"

            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin "${{ steps.git_config.outputs.snapshot_branch }}"
          else
            echo "No changes found. Skipping."
            echo "skip_pr=true" >> $GITHUB_ENV
          fi

      - name: Create Pull Request
        if: ${{ inputs.create_pr == true && env.skip_pr != 'true' }}
        run: |
          gh pr create \
            --base "${{ steps.git_config.outputs.base_branch }}" \
            --head "${{ steps.git_config.outputs.snapshot_branch }}" \
            --title "Preparation Report: ${{ steps.run_info.outputs.run_id }}" \
            --body "$(cat <<'EOF'
          ## Preparation Phase Completed

          **Keywords:** ${{ env.KEYWORDS }}
          **Spec URLs:** ${{ env.SPEC_URLS }}
          **Spec Retry Iterations:** ${{ inputs.spec_retry_iterations }}
          **Checklist Iterations:** ${{ inputs.checklist_iterations }}

          ### Generated Outputs
          - `outputs/01_SPEC.json` - Specification extraction
          - `outputs/01b_TRUSTMODEL.json` - Trust model
          - `outputs/01c_PROP.json` - Properties
          - `outputs/02a_CHECKLIST_BOUNDARIES.json` - Checklist boundaries
          - `outputs/02b_CHECKLIST_PARTIAL_*.json` - Checklist partials

          ---
          *Generated by Security Agent Preparation Pipeline (Run ID: ${{ github.run_id }})*
          EOF
          )" \
            || echo "PR may already exist."

      - name: Push Directly (non-PR mode)
        if: ${{ inputs.create_pr == false }}
        run: |
          git add outputs/

          if ! git diff --staged --quiet; then
            git commit -m "$(cat <<'EOF'
          prep: specification research snapshot

          Keywords: ${{ env.KEYWORDS }}
          Spec URLs: ${{ env.SPEC_URLS }}
          Spec Retry Iterations: ${{ inputs.spec_retry_iterations }}
          Checklist Iterations: ${{ inputs.checklist_iterations }}
          Run ID: ${{ github.run_id }}
          EOF
          )"

            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin HEAD
          else
            echo "No changes found. Skipping push."
          fi

      - name: Upload logs as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: preparation-logs-${{ steps.run_info.outputs.run_id }}
          path: outputs/logs/
          retention-days: 7
