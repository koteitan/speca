name: release
# Tag-driven release pipeline for `speca-cli`.
#
# Trigger: pushing an annotated or lightweight tag of the form `v*.*.*`
# (e.g. `v1.0.0`, `v1.0.1`, `v1.1.0-beta.0`). Pre-release tags ending in
# `-<channel>.<n>` (e.g. `-beta.0`, `-rc.1`) publish to npm under the
# matching dist-tag; everything else publishes to `latest`.
#
# Outputs:
#   1. npm package on registry.npmjs.org/speca-cli
#   2. GitHub Release with the tarball attached as a downloadable asset,
#      using `cli/RELEASE_NOTES_<tag>.md` if present and `--generate-notes`
#      otherwise.
#
# Required repo secrets:
#   - NPM_TOKEN — npm.org "Automation" token with publish scope.
#                 (Settings → Secrets and variables → Actions → New secret.)
#
# `workflow_dispatch` runs the pipeline in dry-run mode: builds, tests, and
# packs but does NOT publish or create a release. Use it to sanity-check
# the pipeline before tagging.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or branch to dry-run against (default: current default branch)"
        required: false
        default: ""

permissions:
  contents: write   # for `gh release create` to push the release record
  id-token: write   # for npm provenance (sigstore attestation, optional)

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: build → test → publish (dry-run on workflow_dispatch)
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    outputs:
      version: ${{ steps.parse.outputs.version }}
      dist-tag: ${{ steps.dist.outputs.dist }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0  # full history for `--generate-notes`

      - name: Parse semver from tag
        id: parse
        if: github.event_name == 'push'
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # ---- Toolchains ----------------------------------------------------
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cli/package-lock.json
          registry-url: "https://registry.npmjs.org"

      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
      - run: uv python install 3.11
      - run: uv sync

      # ripgrep is required by `_execute_grep` in scripts/orchestrator/api_runner.py;
      # the test_grep_with_glob_filter case in tests/test_api_runner.py fails on
      # hosted ubuntu without it (the fallback to `grep -rn` doesn't honour the
      # `--glob` filter). Self-hosted runners typically have rg pre-installed,
      # but the hosted GHA image does not.
      - name: Install ripgrep
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends ripgrep
          fi
          rg --version | head -1

      # ---- Tag ↔ version consistency -------------------------------------
      - name: Verify tag matches cli/package.json version
        if: github.event_name == 'push'
        working-directory: cli
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match cli/package.json (\"$PKG\")."
            echo "::error::Bump cli/package.json before tagging, or retag after the bump."
            exit 1
          fi
          echo "Tag and package version agree: $PKG"

      # ---- Pre-flight tests ----------------------------------------------
      - name: npm ci
        working-directory: cli
        run: npm ci

      - name: typecheck
        working-directory: cli
        run: npm run typecheck

      - name: build (sync-schemas + tsc)
        working-directory: cli
        run: npm run build

      - name: Schema drift — Pydantic → schemas/
        run: uv run python scripts/export_schemas.py --check

      - name: Python pytest
        run: uv run python3 -m pytest tests/ --tb=short -q

      - name: Vitest (incl. Python ↔ TS event contract)
        working-directory: cli
        run: npm run test:coverage

      # ---- Pack and verify tarball ---------------------------------------
      - name: npm pack
        working-directory: cli
        shell: bash
        run: |
          set -euo pipefail
          npm pack
          TARBALL=$(ls speca-cli-*.tgz)
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"
          echo "TARBALL_PATH=cli/$TARBALL" >> "$GITHUB_ENV"

      - name: Tarball size guard (< 5 MB) and forbidden-content scan
        working-directory: cli
        shell: bash
        # Hard cap defends against future `files` changes that accidentally
        # bundle benchmarks/, csv/, outputs/, or anything else heavy. Also
        # explicitly forbids those path segments anywhere in the tarball.
        run: |
          set -euo pipefail
          MAX=$((5 * 1024 * 1024))
          SIZE=$(stat -c%s "$TARBALL")
          KB=$((SIZE / 1024))
          echo "tarball: $TARBALL ($KB KB)"
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "::error::Tarball size $KB KB exceeds 5 MB hard cap."
            echo "::error::Inspect cli/package.json #files and remove large additions."
            tar tzf "$TARBALL" | head -50
            exit 1
          fi
          # Forbidden patterns — paths that should NEVER ship in the npm pkg.
          if tar tzf "$TARBALL" | grep -E "(^|/)(benchmarks?|outputs|csv-patterns|graphs)(/|$)|\.csv$" >/dev/null; then
            echo "::error::Tarball contains forbidden path segment (benchmarks/outputs/csv/graphs)."
            tar tzf "$TARBALL" | grep -E "(^|/)(benchmarks?|outputs|csv-patterns|graphs)(/|$)|\.csv$"
            exit 1
          fi
          echo "tarball content is clean"

      # ---- Determine npm dist-tag ----------------------------------------
      - name: Determine npm dist-tag (latest vs pre-release channel)
        if: github.event_name == 'push'
        id: dist
        shell: bash
        run: |
          set -euo pipefail
          TAG="$GITHUB_REF_NAME"
          # `vX.Y.Z-<channel>.<N>` → channel becomes the dist-tag.
          if [[ "$TAG" =~ -([a-zA-Z]+)\.[0-9]+$ ]]; then
            CHANNEL="${BASH_REMATCH[1]}"
            echo "dist=$CHANNEL" >> "$GITHUB_OUTPUT"
          else
            echo "dist=latest" >> "$GITHUB_OUTPUT"
          fi
          echo "Will publish under dist-tag: $(grep '^dist=' "$GITHUB_OUTPUT" | cut -d= -f2)"

      # ---- Publish to npm (skipped on workflow_dispatch dry-run) ---------
      - name: Publish to npm
        if: github.event_name == 'push'
        working-directory: cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          npm publish --access public --tag "${{ steps.dist.outputs.dist }}" --provenance

      # ---- GitHub Release ------------------------------------------------
      - name: Create GitHub Release with tarball asset
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          NOTES_FILE="cli/RELEASE_NOTES_${GITHUB_REF_NAME}.md"
          if [ -f "$NOTES_FILE" ]; then
            gh release create "$GITHUB_REF_NAME" \
              --title "speca-cli ${GITHUB_REF_NAME}" \
              --notes-file "$NOTES_FILE" \
              "$TARBALL_PATH"
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "speca-cli ${GITHUB_REF_NAME}" \
              --generate-notes \
              "$TARBALL_PATH"
          fi

      # ---- Dry-run summary -----------------------------------------------
      - name: Dry-run summary
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Dry-run complete: tarball built and verified, but NOT published."
          echo "Tarball: $TARBALL_PATH"
          echo "Trigger an actual release by pushing a tag like \`v1.0.0\`."

  # =====================================================================
  # post-publish-smoke
  # ---------------------------------------------------------------------
  # Spin up a clean ubuntu runner that has not seen our build cache, fetch
  # the published `speca-cli@<version>` from npmjs.org, and run the
  # documented first-touch commands (`speca version`, `speca --help`,
  # `speca doctor`). This catches three classes of regression that the
  # in-tree tests can't:
  #
  #   1. The published tarball is missing files (e.g. a stray `dist/` path
  #      that wasn't copied into the package by `files`).
  #   2. The shebang or bin entry resolves wrong on a fresh PATH.
  #   3. The package's runtime deps are mis-pinned (production-only
  #      install fails to resolve a transitive that worked locally because
  #      it was a devDependency).
  #
  # `speca doctor` is run with `|| true` because the runner has no `uv`
  # / `claude` installed, so doctor will report FAIL and exit non-zero —
  # the smoke only verifies the binary doesn't crash.
  # =====================================================================
  post-publish-smoke:
    name: post-publish — install from npm and smoke
    needs: release
    if: github.event_name == 'push'
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Wait for the published version to surface on registry.npmjs.org
        shell: bash
        # npm publish returns before the registry's CDN has caught up.
        # Poll up to 2 minutes (24 × 5 s) for the new version to appear.
        run: |
          set -euo pipefail
          VERSION="${{ needs.release.outputs.version }}"
          echo "Looking for speca-cli@${VERSION} on the registry..."
          for i in $(seq 1 24); do
            if FOUND=$(npm view "speca-cli@${VERSION}" version 2>/dev/null) && [ "$FOUND" = "$VERSION" ]; then
              echo "Visible: speca-cli@${FOUND}"
              exit 0
            fi
            echo "  attempt $i/24 — not yet visible, sleeping 5s..."
            sleep 5
          done
          echo "::error::speca-cli@${VERSION} did not appear on the registry within 2 minutes"
          exit 1

      - name: Global install
        shell: bash
        run: |
          set -euo pipefail
          npm install -g "speca-cli@${{ needs.release.outputs.version }}"
          which speca

      - name: speca version — must print the published semver
        shell: bash
        # `speca version` renders Ink, but in a non-TTY CI environment it
        # still emits the version string (Ink falls back to a static
        # render when stdout is not a TTY). We grep the captured output
        # for the exact version we just published.
        run: |
          set -euo pipefail
          VERSION="${{ needs.release.outputs.version }}"
          OUTPUT=$(speca version 2>&1)
          echo "--- speca version output ---"
          echo "$OUTPUT"
          echo "----------------------------"
          if ! grep -q "$VERSION" <<< "$OUTPUT"; then
            echo "::error::Output did not contain $VERSION"
            exit 1
          fi

      - name: speca help — must print the documented subcommand list
        shell: bash
        run: |
          set -euo pipefail
          OUTPUT=$(speca help 2>&1 || true)
          echo "$OUTPUT"
          for cmd in version doctor auth init run browse ask; do
            grep -q "$cmd" <<< "$OUTPUT" || { echo "::error::help missing $cmd"; exit 1; }
          done

      - name: speca doctor — must run end-to-end without crashing
        shell: bash
        # The runner doesn't have uv or claude installed, so doctor will
        # report FAIL and exit non-zero. We accept that — the smoke is
        # confirming the binary loads, parses, and the doctor command
        # produces structured output (i.e., not a JS module-resolution
        # error or an Ink render crash).
        run: |
          set -euo pipefail
          OUTPUT=$(speca doctor 2>&1 || true)
          echo "$OUTPUT"
          # The output must include the doctor's check-name labels.
          for label in node uv git; do
            grep -qiE "$label" <<< "$OUTPUT" || { echo "::error::doctor output missing $label row"; exit 1; }
          done

      - name: npx speca-cli@version doctor — second route, no global install
        shell: bash
        # Some users will use `npx` instead of `npm install -g`. Verify
        # that route works too (different install cache, different PATH
        # resolution).
        run: |
          set -euo pipefail
          npm uninstall -g speca-cli || true
          OUTPUT=$(npx -y "speca-cli@${{ needs.release.outputs.version }}" version 2>&1)
          echo "$OUTPUT"
          grep -q "${{ needs.release.outputs.version }}" <<< "$OUTPUT"
