name: Security Audit - Preparation Review

on:
  workflow_dispatch:
    inputs:
      create_pr:
        description: 'Create Pull Request (if unchecked, push directly to current branch)'
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  review:
    runs-on: self-hosted
    if: "!startsWith(github.event.head_commit.message, 'Merge')"

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Claude Code configuration (uses browser login session on self-hosted runner)
      CLAUDE_CODE_PERMISSIONS: bypassPermissions
      CLAUDE_CODE_MAX_OUTPUT_TOKENS: 100000

    steps:
      - name: Checkout Security Agent (Self)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify outputs exist
        run: |
          echo "Checking for preparation outputs..."
          ls -la outputs/ || { echo "❌ No outputs directory found"; exit 1; }

          # Check for required files
          for f in 01_SPEC.json 01b_TRUSTMODEL.json 01c_PROP.json; do
            if [ ! -f "outputs/$f" ]; then
              echo "❌ Missing required file: outputs/$f"
              exit 1
            fi
          done
          if ! ls outputs/02_CHECKLIST_PARTIAL_*.json >/dev/null 2>&1; then
            echo "❌ Missing required files: outputs/02_CHECKLIST_PARTIAL_*.json"
            exit 1
          fi

          echo "✅ All required preparation outputs found"

      - name: Get Run Info
        id: run_info
        run: |
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          echo "run_id=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Run Preparation Review
        run: make 02s

      - name: Check Review Results
        id: review_result
        run: |
          if [ -f "outputs/02s_REVIEW_REPORT.json" ]; then
            QUALITY=$(grep -o '"preparation_quality":"[^"]*"' outputs/02s_REVIEW_REPORT.json | cut -d'"' -f4 || echo "UNKNOWN")
            ISSUES=$(grep -o '"total_issues_found":[0-9]*' outputs/02s_REVIEW_REPORT.json | cut -d: -f2 || echo "0")
            FIXES=$(grep -o '"total_fixes_applied":[0-9]*' outputs/02s_REVIEW_REPORT.json | cut -d: -f2 || echo "0")

            echo "quality=${QUALITY}" >> $GITHUB_OUTPUT
            echo "issues=${ISSUES}" >> $GITHUB_OUTPUT
            echo "fixes=${FIXES}" >> $GITHUB_OUTPUT

            echo "📊 Review Results:"
            echo "  Quality: ${QUALITY}"
            echo "  Issues Found: ${ISSUES}"
            echo "  Fixes Applied: ${FIXES}"
          else
            echo "quality=UNKNOWN" >> $GITHUB_OUTPUT
            echo "issues=0" >> $GITHUB_OUTPUT
            echo "fixes=0" >> $GITHUB_OUTPUT
          fi

      - name: Prepare Git Configuration
        id: git_config
        run: |
          git config --global user.name "Security Agent Bot"
          git config --global user.email "bot@nyxfoundation.org"

          SNAPSHOT_BRANCH="review-runs/${{ steps.run_info.outputs.run_id }}"

          echo "run_id=${{ steps.run_info.outputs.run_id }}" >> $GITHUB_OUTPUT
          echo "snapshot_branch=${SNAPSHOT_BRANCH}" >> $GITHUB_OUTPUT
          echo "base_branch=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Create Branch and Push (PR mode)
        if: ${{ inputs.create_pr == true }}
        run: |
          git checkout -b "${{ steps.git_config.outputs.snapshot_branch }}"
          git add outputs/ ':!outputs/logs/'

          if ! git diff --staged --quiet; then
            # JSON changes exist, include logs too
            git add outputs/logs/
            git commit -m "$(cat <<'EOF'
          review: preparation output review

          Quality: ${{ steps.review_result.outputs.quality }}
          Issues Found: ${{ steps.review_result.outputs.issues }}
          Fixes Applied: ${{ steps.review_result.outputs.fixes }}
          Run ID: ${{ github.run_id }}
          EOF
          )"

            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin "${{ steps.git_config.outputs.snapshot_branch }}"
          else
            echo "No changes found. Skipping."
            echo "skip_pr=true" >> $GITHUB_ENV
          fi

      - name: Create Pull Request
        if: ${{ inputs.create_pr == true && env.skip_pr != 'true' }}
        run: |
          gh pr create \
            --base "${{ steps.git_config.outputs.base_branch }}" \
            --head "${{ steps.git_config.outputs.snapshot_branch }}" \
            --title "Preparation Review: ${{ steps.run_info.outputs.run_id }}" \
            --body "$(cat <<'EOF'
          ## Preparation Review Completed

          **Quality:** ${{ steps.review_result.outputs.quality }}
          **Issues Found:** ${{ steps.review_result.outputs.issues }}
          **Fixes Applied:** ${{ steps.review_result.outputs.fixes }}

          ### Review Report
          See `outputs/02s_REVIEW_REPORT.json` for detailed findings.

          ### Next Steps
          - If quality is `PASS`: Proceed to audit phase

          ---
          *Generated by Security Agent Review Pipeline (Run ID: ${{ github.run_id }})*
          EOF
          )" \
            || echo "PR may already exist."

      - name: Push Directly (non-PR mode)
        if: ${{ inputs.create_pr == false }}
        run: |
          git add outputs/ ':!outputs/logs/'

          if ! git diff --staged --quiet; then
            # JSON changes exist, include logs too
            git add outputs/logs/
            git commit -m "$(cat <<'EOF'
          review: preparation output review

          Quality: ${{ steps.review_result.outputs.quality }}
          Issues Found: ${{ steps.review_result.outputs.issues }}
          Fixes Applied: ${{ steps.review_result.outputs.fixes }}
          Run ID: ${{ github.run_id }}
          EOF
          )"

            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin HEAD
          else
            echo "No changes found. Skipping push."
          fi

      - name: Upload logs as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: review-logs-${{ steps.run_info.outputs.run_id }}
          path: outputs/logs/
          retention-days: 7
