name: "RQ2b Benchmark 02: Visualize Results"

on:
  workflow_dispatch:
    inputs:
      speca_results:
        description: "Path to SPECA results JSON (optional)"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  visualize:
    if: ${{ github.actor == 'grandchildrice' || github.actor == 'hirorogo' }}
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1

      - name: Setup Python + benchmark deps (uv)
        run: uv sync --python 3.11 --group benchmark

      - name: Generate Figures
        run: |
          SPECA_ARG=""
          if [ -n "${{ inputs.speca_results }}" ] && [ -f "${{ inputs.speca_results }}" ]; then
            SPECA_ARG="--speca-results ${{ inputs.speca_results }}"
          fi
          uv run python3 benchmarks/rq2b/visualize.py ${SPECA_ARG}

      - name: Verify Output
        run: |
          echo "=== Generated Figures ==="
          ls -la benchmarks/results/rq2b/figures/
          COUNT=$(ls benchmarks/results/rq2b/figures/*.png 2>/dev/null | wc -l)
          echo "Total: ${COUNT} figures"
          if [ "$COUNT" -lt 4 ]; then
            echo "ERROR: Expected at least 4 figures (5 with SPECA venn)"
            exit 1
          fi

      - name: Commit Figures
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benchmarks/results/rq2b/figures/*.png
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(rq2b): regenerate visualization figures"
            git push
          fi
