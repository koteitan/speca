name: tests-on-push
# Runs the Python + CLI test suites on every push to any branch.
#
# Uses the `self-hosted` runner label. If the repo grows multiple
# self-hosted runners with different OS/arch profiles, narrow this with
# additional labels (e.g. `[self-hosted, linux, x64]`).
#
# This workflow intentionally has no path filter and no branch filter —
# the goal is "every push runs tests". The matrix-style cross-platform
# coverage stays in `cli-ci.yml`, which still runs on push/PR to main.

on:
  push:

# Cancel an older in-flight run on the same branch when a new push lands.
# Prevents the self-hosted runner queue from backing up on rapid pushes.
concurrency:
  group: tests-on-push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # ---- Python toolchain -----------------------------------------------
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
      - name: Install Python 3.11 via uv
        run: uv python install 3.11
      - name: Sync Python deps
        run: uv sync
      - name: Python pytest
        run: uv run python3 -m pytest tests/ -v --tb=short

      # ---- Node toolchain -------------------------------------------------
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - name: npm ci
        working-directory: cli
        run: npm ci
      - name: Typecheck
        working-directory: cli
        run: npm run typecheck
      - name: Build CLI (sync-schemas + tsc)
        working-directory: cli
        run: npm run build

      # ---- Cross-language drift checks ------------------------------------
      - name: Schema drift — Pydantic → schemas/
        run: uv run python scripts/export_schemas.py --check
      - name: Schema drift — schemas/ → cli/src/lib/schemas/generated
        working-directory: cli
        shell: bash
        run: |
          npm run sync-schemas
          git diff --exit-code -- src/lib/schemas/generated

      # ---- Vitest (incl. Python↔TS event contract + coverage gate) -------
      - name: Vitest with coverage
        working-directory: cli
        run: npm run test:coverage

      # ---- E2E: orchestrator NDJSON → CLI Zod -----------------------------
      # Runs run_phase.py with --json against an empty workdir (Phase 01b
      # hits the dependency check fast and emits the full lifecycle), then
      # validates every line via the generated Zod union from the built CLI.
      - name: E2E — orchestrator NDJSON → CLI Zod
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/speca-e2e
          cd /tmp/speca-e2e
          uv run --project ${{ github.workspace }} python ${{ github.workspace }}/scripts/run_phase.py \
            --phase 01b --json > events.ndjson 2> orchestrator.stderr || true
          wc -l events.ndjson
          cd ${{ github.workspace }}/cli
          # Script lives next to dist/ so its `./dist/lib/...` import resolves.
          cat > validate-events.mjs <<'NODE'
          import { readFileSync } from "node:fs";
          import { pipelineEventSchema } from "./dist/lib/pipeline/events.js";
          const lines = readFileSync("/tmp/speca-e2e/events.ndjson", "utf8")
            .split("\n").filter((l) => l.trim().length > 0);
          if (lines.length === 0) { console.error("no NDJSON lines emitted"); process.exit(1); }
          const seen = new Set();
          for (const line of lines) {
            const r = pipelineEventSchema.safeParse(JSON.parse(line));
            if (!r.success) {
              console.error("Zod rejected line:", line);
              console.error(JSON.stringify(r.error.issues, null, 2));
              process.exit(1);
            }
            seen.add(r.data.type);
          }
          for (const required of ["pipeline-started", "phase-started", "phase-failed", "pipeline-completed"]) {
            if (!seen.has(required)) {
              console.error("missing event type:", required, "saw:", [...seen]);
              process.exit(1);
            }
          }
          console.log("OK — validated", lines.length, "events covering", [...seen].join(", "));
          NODE
          node validate-events.mjs
          rm -f validate-events.mjs
